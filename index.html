<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no"/>
  <title>PATTA GHOBI</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#080808"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="PATTA GHOBI"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#080808;overscroll-behavior:none}
    body{color:#F0F0F0;font-family:'Syne',sans-serif;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overflow:hidden}
    input,select,button,textarea{-webkit-appearance:none;appearance:none;font-family:'Syne',sans-serif}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    input::placeholder,textarea::placeholder{color:#333}
    select option{background:#111}
    ::-webkit-scrollbar{display:none}

    #wrap{max-width:430px;margin:0 auto;position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;background:#080808;overflow:hidden}

    #hdr{flex-shrink:0;padding-top:max(52px,env(safe-area-inset-top,20px));padding-left:18px;padding-right:18px;padding-bottom:12px;border-bottom:1px solid #252525;background:#080808}
    .hrow{display:flex;justify-content:space-between;align-items:flex-start}
    .logo{font-family:'Bebas Neue',cursive;font-size:32px;color:#C8FF00;letter-spacing:.04em;line-height:1}
    .sub{color:#555;font-size:10px;letter-spacing:.08em;margin-top:2px;text-transform:uppercase}
    .hright{display:flex;align-items:flex-start;gap:10px}
    .wpill{background:#181818;border:1px solid #252525;border-radius:10px;padding:8px 14px;text-align:center;cursor:pointer;min-width:76px}
    .wv{font-family:'Bebas Neue',cursive;font-size:26px;color:#C8FF00;line-height:1}
    .wl{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.06em}
    .settings-btn{background:#181818;border:1px solid #252525;border-radius:10px;padding:10px 12px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;min-height:52px;min-width:44px}

    #nav{flex-shrink:0;display:flex;border-bottom:1px solid #252525;background:#080808}
    .ntab{flex:1;background:none;border:none;padding:11px 0 9px;color:#555;cursor:pointer;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
    .ntab.on{color:#C8FF00;border-bottom-color:#C8FF00}
    .ni{font-size:18px;line-height:1}

    #scr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px 18px 40px}

    .card{background:#111;border:1px solid #252525;border-radius:14px;padding:16px;margin-bottom:12px}
    .csm{background:#111;border:1px solid #252525;border-radius:12px;padding:13px 15px;margin-bottom:9px}

    .sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:12px}
    .st{background:#111;border:1px solid #252525;border-radius:12px;padding:12px 10px}
    .stl{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
    .stv{font-family:'Bebas Neue',cursive;font-size:24px;line-height:1}
    .stu{font-size:10px;color:#555;font-family:'Syne';margin-left:2px}

    .sh{font-family:'Bebas Neue',cursive;font-size:11px;color:#555;letter-spacing:.14em;margin-bottom:10px;margin-top:4px}

    .gbanner{background:linear-gradient(135deg,rgba(200,255,0,.09),rgba(200,255,0,.02));border:1px solid rgba(200,255,0,.22);border-radius:14px;padding:15px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
    .gnum{font-family:'Bebas Neue',cursive;font-size:36px;color:#C8FF00;line-height:1;text-align:right}

    .barbg{height:6px;background:#252525;border-radius:99px}
    .barfill{height:100%;border-radius:99px;background:#C8FF00;transition:width .5s ease}

    .macs{display:flex;gap:10px;margin-top:12px}
    .mac{flex:1;text-align:center}
    .macv{font-family:'Bebas Neue',cursive;font-size:22px;line-height:1}
    .macl{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

    .btnp{background:#C8FF00;color:#000;font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:.06em;border:none;border-radius:10px;padding:15px 20px;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;min-height:50px}
    .btnp:disabled{opacity:.6}
    .btns{background:#181818;border:1px solid #252525;border-radius:8px;padding:12px;color:#555;font-size:13px;cursor:pointer;width:100%;text-align:center;min-height:44px}
    .btnadd{background:#C8FF00;color:#000;border:none;border-radius:8px;padding:9px 16px;font-family:'Bebas Neue',cursive;font-size:14px;cursor:pointer;min-height:40px}
    .btnsend{background:#C8FF00;color:#000;border:none;border-radius:8px;padding:12px 16px;cursor:pointer;font-family:'Bebas Neue',cursive;font-size:16px;white-space:nowrap;min-height:46px;min-width:76px}
    .btndel{background:rgba(255,77,77,.1);border:1px solid rgba(255,77,77,.28);color:#FF4D4D;border-radius:6px;padding:7px 10px;cursor:pointer;font-size:13px;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}
    .btnout{background:#181818;color:#555;border:1px solid #252525;border-radius:10px;padding:14px;cursor:pointer;font-size:13px;flex:1;text-align:center;min-height:48px}

    .inp{background:#181818;border:1px solid #252525;border-radius:8px;padding:12px 13px;color:#F0F0F0;font-family:'Syne';font-size:15px;outline:none;width:100%;min-height:46px}
    .inp:focus{border-color:rgba(200,255,0,.35)}
    .inpbig{font-family:'Bebas Neue',cursive;font-size:36px;text-align:center}
    .lbl{color:#555;font-size:11px;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:5px;margin-top:13px}
    .lbl:first-child{margin-top:0}
    .row2{display:flex;gap:9px;margin-bottom:9px}

    .toggle{display:flex;gap:8px;margin-bottom:10px}
    .tglbtn{flex:1;padding:10px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;text-align:center;min-height:40px;transition:all .2s;border:1px solid #252525}
    .tglbtn.on{background:#C8FF00;color:#000;border-color:#C8FF00}
    .tglbtn:not(.on){background:#181818;color:#555}

    .setrow{display:grid;grid-template-columns:44px 1fr 1fr;gap:8px;padding:9px 0;border-top:1px solid rgba(37,37,37,.6)}
    .setrow:first-child{border-top:none}

    /* Weight history dropdown */
    .wh-summary{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:4px 0}
    .wh-arrow{color:#C8FF00;font-family:'Bebas Neue',cursive;font-size:18px;transition:transform .2s}
    .wh-arrow.open{transform:rotate(180deg)}
    .wh-list{margin-top:12px;border-top:1px solid #252525;padding-top:8px}
    .whr{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(37,37,37,.5)}
    .whr:last-child{border-bottom:none}

    /* Chart */
    .chw{width:100%;overflow:hidden}
    .chw svg{width:100%;display:block}

    .trow{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .tcbtn{background:#181818;border:1px solid #252525;border-radius:8px;width:40px;height:40px;color:#C8FF00;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}

    .chatbox{background:#111;border:1px solid #252525;border-radius:14px;padding:13px;min-height:190px;max-height:280px;overflow-y:auto;margin-bottom:11px;-webkit-overflow-scrolling:touch}
    .msg{margin-bottom:11px;display:flex;flex-direction:column}
    .msg.u{align-items:flex-end}
    .msg.b{align-items:flex-start}
    .bub{border-radius:14px;padding:10px 13px;max-width:88%;font-size:13px;line-height:1.65}
    .bub.u{background:#C8FF00;color:#000;border-radius:14px 14px 4px 14px}
    .bub.b{background:#181818;color:#F0F0F0;border-radius:14px 14px 14px 4px}
    .cinrow{display:flex;gap:9px;margin-bottom:11px}
    .qbtns{display:flex;gap:7px;flex-wrap:wrap}
    .qbtn{background:#181818;border:1px solid #252525;border-radius:20px;padding:8px 13px;color:#555;font-size:11px;cursor:pointer;min-height:36px}

    .rcard{background:#111;border:1px solid rgba(200,255,0,.22);border-radius:14px;padding:15px;margin-bottom:16px}
    .rhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
    .rtxt{font-size:13px;color:#F0F0F0;line-height:1.8;white-space:pre-wrap}
    .rfbtn{background:none;border:1px solid rgba(200,255,0,.3);border-radius:6px;padding:8px 14px;color:#C8FF00;cursor:pointer;font-size:12px;min-height:36px}

    /* API key warning banner */
    .apibanner{background:rgba(255,77,77,.1);border:1px solid rgba(255,77,77,.3);border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:12px}
    .apibanner-icon{font-size:20px;flex-shrink:0;margin-top:1px}
    .apibanner-btn{background:#FF4D4D;color:#000;border:none;border-radius:8px;padding:9px 16px;font-family:'Bebas Neue',cursive;font-size:14px;cursor:pointer;white-space:nowrap;margin-top:8px;min-height:38px}

    /* Settings panel */
    .settings-panel{background:#111;border:1px solid #252525;border-radius:14px;padding:16px;margin-bottom:12px}
    .api-status{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-top:8px}
    .api-ok{background:rgba(200,255,0,.12);color:#C8FF00;border:1px solid rgba(200,255,0,.3)}
    .api-no{background:rgba(255,77,77,.1);color:#FF4D4D;border:1px solid rgba(255,77,77,.3)}
    .api-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:flex-end;justify-content:center}
    .sheet{background:#111;border-radius:22px 22px 0 0;padding:0 18px;padding-bottom:max(32px,env(safe-area-inset-bottom,20px));width:100%;max-width:430px;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 -8px 60px rgba(200,255,0,.08)}
    .shtop{padding:14px 0 16px;position:sticky;top:0;background:#111;z-index:1}
    .hdl{width:38px;height:4px;background:#252525;border-radius:99px;margin:0 auto 14px}
    .stitle{font-family:'Bebas Neue',cursive;font-size:26px;color:#C8FF00;letter-spacing:.04em}

    .photobtn{background:#181818;border:2px dashed rgba(200,255,0,.35);border-radius:14px;padding:28px 14px;cursor:pointer;color:#F0F0F0;width:100%;margin:12px 0 6px;display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center;min-height:130px;font-size:14px}
    .pi{background:#181818;border-radius:10px;padding:10px 13px;margin-bottom:7px}
    .ptotal{background:rgba(200,255,0,.07);border:1px solid rgba(200,255,0,.22);border-radius:10px;padding:11px 13px;margin:9px 0}
    .ptip{font-size:12px;color:#555;line-height:1.6;margin-bottom:12px;padding:10px 13px;background:#181818;border-radius:10px}
    .pact{display:flex;gap:9px;margin-top:4px}

    .spin{display:inline-block;width:18px;height:18px;border:2px solid #252525;border-top-color:#C8FF00;border-radius:50%;animation:spin 1s linear infinite}
    .spin-lg{width:26px;height:26px;border-width:3px}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
    .fade{animation:fadeUp .28s ease forwards}
    .pulse{animation:pulse 1.4s ease infinite}
    .divr{text-align:center;color:#444;font-size:11px;margin:11px 0}
    .flx{display:flex;justify-content:space-between;align-items:center}

    /* Password eye toggle */
    .inp-wrap{position:relative}
    .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#555;cursor:pointer;font-size:16px;padding:4px}
  </style>
</head>
<body>
<div id="wrap">
  <div id="boot" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px">
    <div style="font-family:'Bebas Neue',cursive;font-size:46px;color:#C8FF00;letter-spacing:.04em">PATTA GHOBI</div>
    <div class="spin spin-lg"></div>
    <div style="color:#555;font-size:11px;letter-spacing:.1em">LOADING YOUR COACH...</div>
  </div>
  <div id="hdr" style="display:none"></div>
  <div id="nav" style="display:none"></div>
  <div id="scr" style="display:none"></div>
  <div id="mod"></div>
</div>

<script>
// ── HARDCODED COLORS (no CSS vars — Safari SVG fix) ───────────────────────────
const A="#C8FF00",BG="#080808",CARD="#111111",CARD2="#181818",
      BD="#252525",TEXT="#F0F0F0",MUTED="#555",
      RED="#FF4D4D",TEAL="#00E5CC",YEL="#FFD166";
const LINE_COLORS=["#C8FF00","#00E5CC","#FF6B6B","#FFD166","#BF5AF2","#FF9F43","#48DBF0","#FF6B81"];

// ── STATE ─────────────────────────────────────────────────────────────────────
const S={
  // Start with empty data — user logs their own
  workouts:[], foods:[], weights:[],
  target:75, tab:"home",
  expanded:null, modal:null, whOpen:false,
  useCustom:false, newEx:"Bench Press", customEx:"",
  newSets:[{reps:"",weight:""}],
  newFood:"", newGrams:"100", newWt:"",
  chat:[], chatIn:"", chatLoad:false,
  report:"", repLoad:false,
  photoLoad:false, photoRes:null,
  apiKey:"", showApiKey:false,
};

const PRESETS=["Bench Press","Squat","Deadlift","Pull-ups","Overhead Press","Barbell Row",
  "Dumbbell Curl","Tricep Pushdown","Leg Press","Romanian Deadlift","Lat Pulldown",
  "Hip Thrust","Cable Fly","Incline Bench","Face Pull","Leg Curl","Leg Extension"];
const TODAY="Mar 19";

// ── PERSIST ───────────────────────────────────────────────────────────────────
function sv(){
  try{localStorage.setItem("pg6",JSON.stringify({
    w:S.workouts,f:S.foods,wt:S.weights,t:S.target,
    c:S.chat,r:S.report,k:S.apiKey
  }));}catch(e){}
}
function ld(){
  try{
    const d=JSON.parse(localStorage.getItem("pg6")||"null");
    if(!d)return;
    if(d.w)S.workouts=d.w;
    if(d.f)S.foods=d.f;
    if(d.wt)S.weights=d.wt;
    if(d.t)S.target=d.t;
    if(d.c)S.chat=d.c;
    if(d.r)S.report=d.r;
    if(d.k)S.apiKey=d.k;
  }catch(e){}
}

// ── COMPUTED ──────────────────────────────────────────────────────────────────
const tw=()=>S.workouts.filter(w=>w.date===TODAY);
const tf=()=>S.foods.filter(f=>f.date===TODAY);
function nut(){
  return tf().reduce((a,f)=>({
    cal:a.cal+(+f.cal||0),
    protein:a.protein+(+f.protein||0),
    carbs:a.carbs+(+f.carbs||0),
    fat:a.fat+(+f.fat||0)
  }),{cal:0,protein:0,carbs:0,fat:0});
}
function vol(){
  return tw().reduce((a,w)=>a+w.sets.reduce((b,s)=>b+(+s.reps||0)*(+s.weight||0),0),0);
}
const lw=()=>S.weights.length?S.weights[S.weights.length-1].w:0;
const cg=()=>2500;
const uniq=()=>[...new Set(S.workouts.map(w=>w.name))];
function wtg(){
  if(S.weights.length<2)return"?";
  const last=S.weights[S.weights.length-1].w,first=S.weights[0].w;
  const rate=(last-first)/Math.max(S.weights.length-1,1);
  if(!rate)return"∞";
  const diff=S.target-last;
  if((diff>0&&rate<0)||(diff<0&&rate>0))return"∞";
  return Math.abs(Math.ceil(diff/rate));
}

// ── CHARTS ────────────────────────────────────────────────────────────────────
function mkWtChart(){
  const actual=S.weights.map(w=>({date:w.date,actual:w.w}));
  if(S.weights.length<2)return`<div style="color:${MUTED};font-size:12px;text-align:center;padding:20px 0">Log at least 2 weight entries to see your chart</div>`;
  const last=S.weights[S.weights.length-1].w,first=S.weights[0].w;
  const rate=(last-first)/Math.max(S.weights.length-1,1);
  const pDates=["Apr 1","Apr 8","Apr 15","Apr 22","May 1","May 8","Jun 1"];
  const proj=pDates.map((date,i)=>({date,projected:+(last+rate*(i+2)*1.5).toFixed(1)}));
  const all=[...actual,...proj];
  const allV=[...S.weights.map(w=>w.w),...proj.map(p=>p.projected),S.target];
  const mn=Math.min(...allV)-1,mx=Math.max(...allV)+1,rng=mx-mn||1;
  const W=360,H=150,pl=36,pr=8,pt=10,pb=20,iW=W-pl-pr,iH=H-pt-pb,N=all.length;
  const xs=all.map((_,i)=>pl+i*(iW/Math.max(N-1,1)));
  const fy=v=>pt+iH-((v-mn)/rng)*iH;
  let aP="",pP="",ast=false,pst=false;
  all.forEach((d,i)=>{
    if(d.actual!=null){aP+=(ast?"L":"M")+xs[i].toFixed(1)+","+fy(d.actual).toFixed(1)+" ";ast=true;}
    if(d.projected!=null){pP+=(pst?"L":"M")+xs[i].toFixed(1)+","+fy(d.projected).toFixed(1)+" ";pst=true;}
  });
  const ty=fy(S.target).toFixed(1);
  let dots="";actual.forEach((d,i)=>dots+=`<circle cx="${xs[i].toFixed(1)}" cy="${fy(d.actual).toFixed(1)}" r="3.5" fill="${A}" stroke="${CARD}" stroke-width="2"/>`);
  const step=Math.max(1,Math.ceil(N/5));
  let xlabs="";all.forEach((d,i)=>{if(i%step===0||i===N-1)xlabs+=`<text x="${xs[i].toFixed(1)}" y="${H-3}" fill="#444" font-size="9" text-anchor="middle" font-family="Syne,sans-serif">${d.date}</text>`;});
  const yv=[+mn.toFixed(1),+(mn+(mx-mn)/2).toFixed(1),+mx.toFixed(1)];
  let ygr="";yv.forEach(v=>{const y=fy(v).toFixed(1);ygr+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="#1E1E1E" stroke-width="1"/><text x="${pl-3}" y="${y}" fill="#444" font-size="9" text-anchor="end" dominant-baseline="middle" font-family="Syne,sans-serif">${v}</text>`;});
  return`<div class="chw"><svg viewBox="0 0 ${W} ${H}">${ygr}
    <line x1="${pl}" y1="${ty}" x2="${W-pr}" y2="${ty}" stroke="${RED}" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="${W-pr-2}" y="${+ty-5}" fill="${RED}" font-size="9" text-anchor="end" font-family="Syne,sans-serif">Target ${S.target}kg</text>
    <path d="${aP}" fill="none" stroke="${A}" stroke-width="2.5" stroke-linecap="round"/>
    <path d="${pP}" fill="none" stroke="${A}" stroke-width="2" stroke-dasharray="6 4" opacity=".55"/>
    ${dots}${xlabs}</svg></div>`;
}

function mkMultiExChart(){
  const names=uniq();
  if(!names.length)return`<div style="color:${MUTED};font-size:12px;text-align:center;padding:20px 0">Log workouts to see progress charts</div>`;
  const dateOrder=[];
  const exData={};
  names.forEach(name=>{
    const map={};
    S.workouts.filter(w=>w.name===name).forEach(w=>{
      const mx=Math.max(...w.sets.map(s=>+s.weight||0));
      if(!map[w.date]||map[w.date]<mx)map[w.date]=mx;
      if(!dateOrder.includes(w.date))dateOrder.push(w.date);
    });
    exData[name]=map;
  });
  if(dateOrder.length<2)return`<div style="color:${MUTED};font-size:12px;text-align:center;padding:20px 0">Log workouts on 2+ dates to see progress</div>`;
  const allVals=[];
  names.forEach(n=>Object.values(exData[n]).forEach(v=>allVals.push(v)));
  if(!allVals.length)return"";
  const mn=Math.max(0,Math.min(...allVals)-10),mx=Math.max(...allVals)+10,rng=mx-mn||1;
  const W=360,H=200,pl=36,pr=8,pt=10,pb=20,iW=W-pl-pr,iH=H-pt-pb,N=dateOrder.length;
  const xOf=i=>pl+i*(iW/Math.max(N-1,1));
  const fy=v=>pt+iH-((v-mn)/rng)*iH;
  let lines="",dotsAll="";
  names.forEach((name,ni)=>{
    const color=LINE_COLORS[ni%LINE_COLORS.length];
    let path="",dots="",st=false;
    dateOrder.forEach((date,i)=>{
      const v=exData[name][date];
      if(v==null){st=false;return;}
      path+=(st?"L":"M")+xOf(i).toFixed(1)+","+fy(v).toFixed(1)+" ";st=true;
      dots+=`<circle cx="${xOf(i).toFixed(1)}" cy="${fy(v).toFixed(1)}" r="3.5" fill="${color}" stroke="${CARD}" stroke-width="2"/>`;
    });
    if(path){lines+=`<path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;dotsAll+=dots;}
  });
  const step=Math.max(1,Math.ceil(N/5));
  let xlabs="";dateOrder.forEach((d,i)=>{if(i%step===0||i===N-1)xlabs+=`<text x="${xOf(i).toFixed(1)}" y="${H-3}" fill="#444" font-size="9" text-anchor="middle" font-family="Syne,sans-serif">${d}</text>`;});
  const yv=[+mn.toFixed(0),+(mn+(mx-mn)/2).toFixed(0),+mx.toFixed(0)];
  let ygr="";yv.forEach(v=>{const y=fy(v).toFixed(1);ygr+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="#1E1E1E" stroke-width="1"/><text x="${pl-3}" y="${y}" fill="#444" font-size="9" text-anchor="end" dominant-baseline="middle" font-family="Syne,sans-serif">${v}</text>`;});
  const legend=names.map((n,i)=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:20px;height:3px;background:${LINE_COLORS[i%LINE_COLORS.length]};border-radius:2px;flex-shrink:0"></div><span style="font-size:11px;color:${TEXT}">${n}</span></div>`).join("");
  return`<div class="chw"><svg viewBox="0 0 ${W} ${H}">${ygr}${lines}${dotsAll}${xlabs}</svg></div><div style="display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:12px;padding-top:12px;border-top:1px solid ${BD}">${legend}</div>`;
}

// ── API ───────────────────────────────────────────────────────────────────────
async function claude(messages,sys){
  if(!S.apiKey){
    return"⚠️ No API key set. Tap the ⚙️ button in the top-right corner, enter your Anthropic API key, and try again.";
  }
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":S.apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys||"",messages})
    });
    const d=await r.json();
    if(d.error)return"AI error: "+d.error.message;
    return d.content?.map(b=>b.text||"").join("")||"No response.";
  }catch(e){
    return"Could not connect. Please check your internet connection.";
  }
}

      <input class="inp inpbig" type="number" inputmode="decimal" step="0.5" id="tginp" value="${S.target}" oninput="S.target=+this.value" style="margin-bottom:10px"/>
      <button class="btnp" onclick="sv();M(null)">SAVE TARGET</button>
    </div>

    <div class="settings-panel" style="border-color:rgba(255,77,77,.25)">
      <div style="font-family:'Bebas Neue',cursive;font-size:16px;color:${RED};letter-spacing:.08em;margin-bottom:8px">⚠️ CLEAR ALL DATA</div>
      <div style="font-size:12px;color:${MUTED};margin-bottom:12px">This will delete all your workouts, food logs, and weight history.</div>
      <button onclick="clearAll()" style="background:rgba(255,77,77,.1);border:1px solid rgba(255,77,77,.3);color:${RED};border-radius:8px;padding:12px;font-size:13px;cursor:pointer;width:100%;min-height:44px">Delete All My Data</button>
    </div>
  </div>
  </div>`;
}

function mWorkout(){
  return`<div class="overlay" onclick="M(null)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="shtop"><div class="hdl"></div><div class="stitle">LOG EXERCISE</div></div>
    <div class="toggle">
      <button class="tglbtn ${!S.useCustom?"on":""}" onclick="S.useCustom=false;R()">From List</button>
      <button class="tglbtn ${S.useCustom?"on":""}" onclick="S.useCustom=true;R()">Custom Name</button>
    </div>
    ${!S.useCustom
      ?`<label class="lbl">Exercise</label><select class="inp" id="es" style="margin-bottom:14px">${PRESETS.map(e=>`<option ${S.newEx===e?"selected":""}>${e}</option>`).join("")}</select>`
      :`<label class="lbl">Exercise Name</label><input class="inp" id="cex" placeholder="e.g. Moon Walk, Cable Fly" value="${S.customEx||""}" oninput="S.customEx=this.value" style="margin-bottom:14px"/>`
    }
    <label class="lbl">Sets (Reps / Weight in kg)</label>
    ${S.newSets.map((s,i)=>`<div class="row2">
      <input class="inp" type="number" inputmode="numeric" placeholder="Reps" value="${s.reps}" oninput="S.newSets[${i}].reps=this.value"/>
      <input class="inp" type="number" inputmode="decimal" placeholder="Weight kg" value="${s.weight}" oninput="S.newSets[${i}].weight=this.value"/>
      ${S.newSets.length>1?`<button onclick="RS(${i})" style="background:${CARD2};border:1px solid ${BD};border-radius:8px;color:${RED};padding:0 13px;cursor:pointer;font-size:16px;min-height:46px;flex-shrink:0">✕</button>`:""}
    </div>`).join("")}
    <button class="btns" style="margin-top:4px;margin-bottom:14px" onclick="AS()">+ Add Another Set</button>
    <button class="btnp" onclick="SW()">SAVE EXERCISE</button>
  </div>
  </div>`;
}

function mFood(){
  return`<div class="overlay" onclick="M(null)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="shtop"><div class="hdl"></div><div class="stitle">LOG FOOD</div></div>
    <div style="color:${MUTED};font-size:12px;margin-bottom:4px">📸 Upload a food photo — AI estimates all macros automatically</div>
    <input type="file" accept="image/*" capture="environment" id="pf" style="display:none" onchange="PH(this)"/>
    ${!S.photoRes?`
      <button class="photobtn" onclick="document.getElementById('pf').click()">
        ${S.photoLoad
          ?`<div class="spin spin-lg"></div><span class="pulse" style="color:${MUTED};font-size:13px;margin-top:4px">AI analyzing your food...</span>`
          :`<div style="font-size:40px">📸</div><div style="font-weight:600">Take or upload a photo</div><div style="color:${MUTED};font-size:11px">AI identifies every item & estimates macros</div>`}
      </button>
      <div class="divr">— or enter manually —</div>
      <label class="lbl">Food Name</label>
      <input class="inp" id="fn" placeholder="e.g. Dal Rice, Chicken Tikka" style="margin-bottom:9px" value="${S.newFood||""}" oninput="S.newFood=this.value"/>
      <label class="lbl">Grams / Serving</label>
      <input class="inp" type="number" inputmode="numeric" style="margin-bottom:14px" value="${S.newGrams||100}" oninput="S.newGrams=this.value"/>
      <button class="btnp" onclick="SF()">SAVE FOOD</button>
    `:""}
    ${S.photoRes&&!S.photoRes.raw?`
      ${(S.photoRes.items||[]).map(it=>`<div class="pi">
        <div style="font-weight:700;font-size:14px">${it.name} <span style="color:${MUTED};font-size:12px">~${it.grams_estimated}g</span></div>
        <div style="font-size:12px;color:${MUTED};margin-top:3px"><span style="color:${YEL}">${it.calories} kcal</span> · <span style="color:${RED}">${it.protein}g P</span> · <span style="color:${TEAL}">${it.carbs}g C</span></div>
      </div>`).join("")}
      ${S.photoRes.totals?`<div class="ptotal">
        <div style="font-family:'Bebas Neue',cursive;font-size:12px;color:${A};margin-bottom:5px">TOTAL</div>
        <div><span style="color:${YEL};font-family:'Bebas Neue',cursive;font-size:22px">${S.photoRes.totals.calories}</span><span style="color:${MUTED}"> kcal · </span><span style="color:${RED}">${S.photoRes.totals.protein}g P</span> · <span style="color:${TEAL}">${S.photoRes.totals.carbs}g C</span></div>
      </div>`:""}
      ${S.photoRes.tip?`<div class="ptip">🤖 ${S.photoRes.tip}</div>`:""}
      <div class="pact">
        <button class="btnp" style="flex:2" onclick="AP()">ADD TO LOG</button>
        <button class="btnout" onclick="S.photoRes=null;R()">Retry</button>
      </div>
    `:""}
    ${S.photoRes&&S.photoRes.raw?`<div style="font-size:13px;color:${TEXT};line-height:1.7;margin-bottom:12px">${S.photoRes.raw}</div><button class="btns" onclick="S.photoRes=null;R()">Try Again</button>`:""}
  </div>
  </div>`;
}

function mWeight(){
  return`<div class="overlay" onclick="M(null)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="shtop"><div class="hdl"></div><div class="stitle">LOG WEIGHT</div></div>
    <label class="lbl">Today's Weight (kg)</label>
    <input class="inp inpbig" type="number" inputmode="decimal" step="0.1" placeholder="e.g. 79.8" id="wi" style="margin-bottom:18px" value="${S.newWt||""}" oninput="S.newWt=this.value"/>
    <button class="btnp" onclick="SaveWt()">SAVE</button>
  </div>
  </div>`;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
window.T    = t  => { S.tab=t; R(); };
window.EX   = id => { S.expanded=S.expanded===id?null:id; R(); };
window.M    = m  => { S.modal=m; if(!m)S.photoRes=null; R(); };
window.TG   = d  => { S.target=+(S.target+d).toFixed(1); sv(); R(); };
window.AS   = () => { S.newSets.push({reps:"",weight:""}); R(); };
window.RS   = i  => { if(S.newSets.length>1)S.newSets.splice(i,1); R(); };
window.DW   = id => { S.workouts=S.workouts.filter(w=>w.id!==id); sv(); R(); };
window.DF   = id => { S.foods=S.foods.filter(f=>f.id!==id); sv(); R(); };
window.DWT  = idx=> { S.weights.splice(idx,1); sv(); R(); };
window.WHT  = ()=> { S.whOpen=!S.whOpen; R(); };

window.saveKey = () => {
  const v=document.getElementById("apiinp")?.value||S.apiKey;
  S.apiKey=v.trim(); sv(); M(null);
};

window.clearAll = () => {
  if(!confirm("Delete ALL your data? This cannot be undone."))return;
  S.workouts=[]; S.foods=[]; S.weights=[];
  S.chat=[]; S.report=""; S.whOpen=false;
  sv(); M(null); R();
};

window.SW = () => {
  const s0=S.newSets[0]; if(!s0.reps||!s0.weight)return;
  const name=S.useCustom
    ?(document.getElementById("cex")?.value||S.customEx||"Custom")
    :(document.getElementById("es")?.value||S.newEx);
  S.workouts.push({id:Date.now(),date:TODAY,name,sets:S.newSets.map(s=>({reps:+s.reps,weight:+s.weight}))});
  S.newSets=[{reps:"",weight:""}]; S.customEx=""; S.useCustom=false; S.modal=null; sv(); R();
};

window.SF = () => {
  const name=document.getElementById("fn")?.value||S.newFood;
  const g=+(S.newGrams||100); if(!name)return;
  S.foods.push({id:Date.now(),date:TODAY,name,
    cal:Math.round(g*1.5),protein:Math.round(g*.2),
    carbs:Math.round(g*.3),fat:Math.round(g*.05)});
  S.newFood=""; S.modal=null; sv(); R();
};

window.SaveWt = () => {
  const v=+(document.getElementById("wi")?.value||S.newWt); if(!v)return;
  S.weights.push({date:TODAY,w:v}); S.newWt=""; S.modal=null; sv(); R();
};

window.PH = async (inp) => {
  const file=inp.files[0]; if(!file)return;
  S.photoLoad=true; S.photoRes=null; R();
  const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
  try{
    const reply=await claude([{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:b64}},
      {type:"text",text:`Identify all food items in this image. Return ONLY valid JSON (no markdown): {"items":[{"name":"","grams_estimated":0,"calories":0,"protein":0,"carbs":0,"fat":0}],"totals":{"calories":0,"protein":0,"carbs":0,"fat":0},"tip":""}`}
    ]}]);
    const clean=reply.replace(/```json\n?|```/g,"").trim();
    S.photoRes=JSON.parse(clean);
  }catch(e){S.photoRes={raw:"Could not analyze photo. Please try again or enter manually."};}
  S.photoLoad=false; R();
};

window.AP = () => {
  if(!S.photoRes?.totals)return;
  const t=S.photoRes.totals;
  S.foods.push({id:Date.now(),date:TODAY,name:(S.photoRes.items||[]).map(i=>i.name).join(", ")||"Photo Meal",cal:t.calories,protein:t.protein,carbs:t.carbs,fat:t.fat});
  S.photoRes=null; S.modal=null; sv(); R();
};

window.doRep = async () => {
  S.repLoad=true; S.report=""; R();
  S.report=await claude(
    [{role:"user",content:`My fitness data: ${ctx()}\n\nGive me a personalized coach report:\n1. Analysis of my current progress based on the data\n2. Specific weight targets to aim for next session on each of my exercises\n3. Diet suggestions based on my nutrition data\n4. One motivational insight\nBe direct, specific, under 250 words. Use bullet points.`}],
    "You are an expert personal trainer and nutritionist. Give precise, actionable advice based only on the user's data."
  );
  S.repLoad=false; sv(); R();
};

window.CH = async () => {
  const msg=(document.getElementById("ci")?.value||S.chatIn||"").trim();
  if(!msg||S.chatLoad)return;
  S.chat.push({role:"user",content:msg}); S.chatIn=""; S.chatLoad=true; R();
  setTimeout(()=>document.getElementById("ce")?.scrollIntoView({behavior:"smooth"}),60);
  const reply=await claude(
    S.chat.map(m=>({role:m.role,content:m.content})),
    `You are PATTA GHOBI's AI fitness coach. User data: ${ctx()}. Be concise and reference their actual numbers.`
  );
  S.chat.push({role:"assistant",content:reply}); S.chatLoad=false; sv(); R();
  setTimeout(()=>document.getElementById("ce")?.scrollIntoView({behavior:"smooth"}),100);
};

window.QA = q => {
  S.chatIn=q; S.tab="coach"; R();
  setTimeout(()=>{const el=document.getElementById("ci");if(el){el.value=q;el.focus();}},100);
};

// ── BOOT ──────────────────────────────────────────────────────────────────────
try{ld();}catch(e){}
document.getElementById("boot").style.display="none";
document.getElementById("hdr").style.display="";
document.getElementById("nav").style.display="";
document.getElementById("scr").style.display="";
R();
if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js").catch(()=>{});
</script>
</body>
</html>
