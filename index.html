<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no,maximum-scale=1"/>
  <title>PATTA GHOBI</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#080808"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="PATTA GHOBI"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
      --safe-l: env(safe-area-inset-left, 0px);
      --safe-r: env(safe-area-inset-right, 0px);
      --accent: #C8FF00;
      --bg: #080808;
      --card: #111111;
      --card2: #181818;
      --border: #252525;
      --text: #F0F0F0;
      --muted: #555555;
      --red: #FF4D4D;
      --teal: #00E5CC;
      --yellow: #FFD166;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; background: var(--bg); }
    body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Syne', sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      overflow: hidden;
    }
    input, select, button, textarea {
      -webkit-appearance: none; appearance: none;
      font-family: 'Syne', sans-serif;
      border-radius: 0;
    }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input::placeholder, textarea::placeholder { color: #333; }
    select option { background: #111; }
    ::-webkit-scrollbar { display: none; }

    /* App Shell */
    #app {
      width: 100%; max-width: 430px; margin: 0 auto;
      height: 100dvh;
      display: flex; flex-direction: column;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    /* Header */
    #header {
      flex-shrink: 0;
      padding: calc(var(--safe-top) + 16px) calc(var(--safe-r) + 18px) 14px calc(var(--safe-l) + 18px);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .hrow { display: flex; justify-content: space-between; align-items: flex-start; }
    .logo { font-family: 'Bebas Neue', cursive; font-size: 34px; color: var(--accent); letter-spacing: .04em; line-height: 1; }
    .sub { color: var(--muted); font-size: 10px; letter-spacing: .1em; margin-top: 3px; text-transform: uppercase; }
    .wt-pill {
      background: var(--card2); border: 1px solid var(--border); border-radius: 10px;
      padding: 8px 14px; text-align: center; cursor: pointer; min-width: 60px;
    }
    .wt-v { font-family: 'Bebas Neue', cursive; font-size: 24px; color: var(--accent); line-height: 1; }
    .wt-l { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .goal-row { display: flex; gap: 6px; margin-top: 8px; justify-content: flex-end; }
    .gbtn {
      border: 1px solid var(--border); border-radius: 6px;
      padding: 7px 12px; cursor: pointer;
      font-family: 'Bebas Neue', cursive; font-size: 12px; letter-spacing: .04em;
      transition: all .2s; min-height: 36px;
    }
    .gbtn.on { background: var(--accent); color: #000; border-color: var(--accent); }
    .gbtn:not(.on) { background: var(--card2); color: var(--muted); }

    /* Nav */
    #nav {
      flex-shrink: 0;
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .tab {
      flex: 1; background: none; border: none;
      padding: 12px 0 calc(10px); color: var(--muted);
      cursor: pointer; font-size: 9px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      border-bottom: 2px solid transparent; transition: all .2s;
      min-height: 56px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
    }
    .tab.on { color: var(--accent); border-bottom-color: var(--accent); }
    .ti { font-size: 18px; line-height: 1; }

    /* Main scroll */
    #main {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 18px calc(var(--safe-r) + 18px) 32px calc(var(--safe-l) + 18px);
      -webkit-overflow-scrolling: touch;
    }

    /* Cards */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
    .card-sm { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }

    /* Stats */
    .stats3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 10px; }
    .sl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px; }
    .sv { font-family: 'Bebas Neue', cursive; font-size: 24px; line-height: 1; }
    .su { font-size: 10px; color: var(--muted); font-family: 'Syne'; margin-left: 2px; }

    /* Section head */
    .sh { font-family: 'Bebas Neue', cursive; font-size: 12px; color: var(--muted); letter-spacing: .14em; margin-bottom: 12px; margin-top: 4px; }

    /* Goal banner */
    .gbanner {
      background: linear-gradient(135deg, rgba(200,255,0,.1), rgba(200,255,0,.03));
      border: 1px solid rgba(200,255,0,.25); border-radius: 14px;
      padding: 16px; margin-bottom: 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .g-num { font-family: 'Bebas Neue', cursive; font-size: 38px; color: var(--accent); line-height: 1; }

    /* Bar */
    .bar-bg { height: 6px; background: var(--border); border-radius: 99px; }
    .bar-fill { height: 100%; border-radius: 99px; background: var(--accent); transition: width .6s ease; }

    /* Macros */
    .macros { display: flex; gap: 12px; margin-top: 14px; }
    .mac { flex: 1; text-align: center; }
    .mac-v { font-family: 'Bebas Neue', cursive; font-size: 22px; line-height: 1; }
    .mac-l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-top: 2px; }

    /* Lift row */
    .lift-row { display: flex; justify-content: space-between; align-items: center; }
    .lift-actions { display: flex; align-items: center; gap: 10px; }
    .del-btn {
      background: rgba(255,77,77,.12); border: 1px solid rgba(255,77,77,.3);
      color: var(--red); border-radius: 6px; padding: 6px 10px;
      cursor: pointer; font-size: 13px; min-width: 36px; min-height: 36px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Sets table */
    .sets-wrap { border-top: 1px solid var(--border); padding: 12px 16px 14px; }
    .set-row { display: grid; grid-template-columns: 50px 1fr 1fr; gap: 8px; padding: 9px 0; border-top: 1px solid rgba(37,37,37,.6); }
    .set-row:first-child { border-top: none; }
    .set-num { color: var(--muted); font-size: 12px; align-self: center; }
    .set-reps { text-align: center; font-weight: 600; font-size: 14px; align-self: center; }
    .set-wt { text-align: right; font-family: 'Bebas Neue', cursive; font-size: 20px; color: var(--accent); }
    .vol-total { margin-top: 10px; background: var(--card2); border-radius: 8px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }

    /* Chart */
    .chart-wrap { width: 100%; overflow: hidden; border-radius: 4px; }
    svg.chart { width: 100%; display: block; }

    /* Weight history */
    .wh-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(37,37,37,.6); }
    .wh-row:last-child { border-bottom: none; }
    .wh-date { color: var(--muted); font-size: 13px; }
    .wh-val { font-family: 'Bebas Neue', cursive; font-size: 22px; color: var(--accent); }

    /* Target ctrl */
    .trow { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .tctrl { display: flex; flex-direction: column; gap: 6px; align-items: center; }
    .tbtn {
      background: var(--card2); border: 1px solid var(--border); border-radius: 8px;
      width: 40px; height: 40px; color: var(--accent); font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-weight: 700;
    }

    /* PR */
    .pr-row { display: flex; justify-content: space-between; align-items: center; }

    /* Streak */
    .streak-grid { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; }
    .sd { width: 22px; height: 22px; border-radius: 4px; }

    /* Chat */
    .chatbox { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; min-height: 200px; max-height: 300px; overflow-y: auto; margin-bottom: 12px; -webkit-overflow-scrolling: touch; }
    .chat-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 30px 10px; line-height: 1.7; }
    .msg { margin-bottom: 12px; display: flex; flex-direction: column; }
    .msg.u { align-items: flex-end; }
    .msg.b { align-items: flex-start; }
    .bubble { border-radius: 14px; padding: 10px 14px; max-width: 88%; font-size: 13px; line-height: 1.7; }
    .bubble.u { background: var(--accent); color: #000; border-radius: 14px 14px 4px 14px; }
    .bubble.b { background: var(--card2); color: var(--text); border-radius: 14px 14px 14px 4px; }
    .cinrow { display: flex; gap: 10px; margin-bottom: 12px; }
    .qbtns { display: flex; gap: 8px; flex-wrap: wrap; }
    .qbtn { background: var(--card2); border: 1px solid var(--border); border-radius: 20px; padding: 8px 14px; color: var(--muted); font-size: 11px; cursor: pointer; min-height: 36px; }

    /* Report */
    .rcard { background: var(--card); border: 1px solid rgba(200,255,0,.25); border-radius: 14px; padding: 16px; margin-bottom: 18px; }
    .rhead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .rtxt { font-size: 13px; color: var(--text); line-height: 1.85; white-space: pre-wrap; }
    .rfbtn { background: none; border: 1px solid rgba(200,255,0,.35); border-radius: 6px; padding: 8px 16px; color: var(--accent); cursor: pointer; font-size: 12px; min-height: 36px; }

    /* Buttons */
    .btn-p {
      background: var(--accent); color: #000;
      font-family: 'Bebas Neue', cursive; font-size: 18px; letter-spacing: .06em;
      border: none; border-radius: 10px; padding: 16px 24px;
      cursor: pointer; width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      min-height: 52px;
    }
    .btn-p:disabled { opacity: .6; }
    .btn-s { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--muted); font-size: 13px; cursor: pointer; width: 100%; text-align: center; min-height: 44px; }
    .btn-send {
      background: var(--accent); color: #000; border: none; border-radius: 8px;
      padding: 12px 18px; cursor: pointer;
      font-family: 'Bebas Neue', cursive; font-size: 16px;
      white-space: nowrap; min-height: 48px; min-width: 80px;
    }
    .btn-add {
      background: var(--accent); color: #000; border: none; border-radius: 8px;
      padding: 10px 18px; font-family: 'Bebas Neue', cursive; font-size: 15px;
      cursor: pointer; min-height: 42px;
    }
    .btn-out { background: var(--card2); color: var(--muted); border: 1px solid var(--border); border-radius: 10px; padding: 14px; cursor: pointer; font-size: 13px; flex: 1; text-align: center; min-height: 48px; }

    /* Inputs */
    .inp {
      background: var(--card2); border: 1px solid var(--border); border-radius: 8px;
      padding: 13px 14px; color: var(--text);
      font-family: 'Syne', sans-serif; font-size: 15px;
      outline: none; width: 100%;
      min-height: 48px;
    }
    .inp:focus { border-color: rgba(200,255,0,.4); }
    .inp-big { font-family: 'Bebas Neue', cursive; font-size: 36px; text-align: center; }
    label.lbl { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; display: block; margin-bottom: 6px; margin-top: 14px; }
    label.lbl:first-child { margin-top: 0; }
    .row2 { display: flex; gap: 10px; }

    /* Modal */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.82);
      z-index: 200; display: flex; align-items: flex-end; justify-content: center;
    }
    .sheet {
      background: var(--card);
      border-radius: 22px 22px 0 0;
      padding: 0 20px calc(var(--safe-bot) + 32px);
      width: 100%; max-width: 430px;
      max-height: 90dvh; overflow-y: auto;
      box-shadow: 0 -8px 60px rgba(200,255,0,.1);
      -webkit-overflow-scrolling: touch;
    }
    .sheet-top { padding: 16px 0 20px; position: sticky; top: 0; background: var(--card); z-index: 1; }
    .handle { width: 40px; height: 4px; background: var(--border); border-radius: 99px; margin: 0 auto 16px; }
    .stitle { font-family: 'Bebas Neue', cursive; font-size: 26px; color: var(--accent); letter-spacing: .04em; }

    /* Photo */
    .photo-btn {
      background: var(--card2); border: 2px dashed rgba(200,255,0,.4); border-radius: 14px;
      padding: 30px 16px; cursor: pointer; color: var(--text); font-size: 14px;
      width: 100%; margin-top: 14px; margin-bottom: 4px;
      display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center;
      min-height: 140px;
    }
    .pi { background: var(--card2); border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; }
    .ptotal { background: rgba(200,255,0,.08); border: 1px solid rgba(200,255,0,.25); border-radius: 10px; padding: 12px 14px; margin: 10px 0; }
    .ptip { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 14px; padding: 10px 14px; background: var(--card2); border-radius: 10px; }
    .pact { display: flex; gap: 10px; }

    /* Spinner */
    .spin { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.5} }
    .fade { animation: fadeUp .3s ease forwards; }
    .pulse { animation: pulse 1.5s ease infinite; }

    /* Custom exercise toggle */
    .ex-toggle { display: flex; gap: 8px; margin-bottom: 8px; }
    .ex-toggle-btn { flex: 1; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; text-align: center; min-height: 40px; transition: all .2s; }
    .ex-toggle-btn.on { background: var(--accent); color: #000; border: 1px solid var(--accent); }
    .ex-toggle-btn:not(.on) { background: var(--card2); color: var(--muted); border: 1px solid var(--border); }

    /* Divider */
    .divider { text-align: center; color: var(--muted); font-size: 11px; margin: 12px 0; }
  </style>
</head>
<body>
<div id="app">
  <div id="boot" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;gap:16px">
    <div style="font-family:'Bebas Neue',cursive;font-size:48px;color:#C8FF00;letter-spacing:.04em">PATTA GHOBI</div>
    <div class="spin" style="width:28px;height:28px;border-width:3px"></div>
    <div style="color:#555;font-size:11px;letter-spacing:.12em">LOADING YOUR COACH...</div>
  </div>
</div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
const S = {
  workouts: [
    {id:1,date:"Mar 10",name:"Bench Press",sets:[{reps:8,weight:50},{reps:8,weight:50},{reps:6,weight:50}]},
    {id:2,date:"Mar 10",name:"Squat",      sets:[{reps:10,weight:80},{reps:8,weight:85}]},
    {id:3,date:"Mar 13",name:"Bench Press",sets:[{reps:8,weight:52},{reps:7,weight:52}]},
    {id:4,date:"Mar 13",name:"Deadlift",   sets:[{reps:5,weight:100},{reps:5,weight:105}]},
    {id:5,date:"Mar 16",name:"Bench Press",sets:[{reps:8,weight:55},{reps:7,weight:55},{reps:6,weight:55}]},
    {id:6,date:"Mar 16",name:"Squat",      sets:[{reps:10,weight:90},{reps:8,weight:90}]},
    {id:7,date:"Mar 19",name:"Bench Press",sets:[{reps:8,weight:57},{reps:8,weight:57}]},
    {id:8,date:"Mar 19",name:"Overhead Press",sets:[{reps:10,weight:40},{reps:8,weight:42}]},
  ],
  foods: [
    {id:1,date:"Mar 19",name:"Chicken Breast",cal:330,protein:62,carbs:0,fat:8},
    {id:2,date:"Mar 19",name:"Oats",          cal:389,protein:17,carbs:66,fat:7},
    {id:3,date:"Mar 19",name:"Protein Shake", cal:120,protein:25,carbs:5, fat:2},
  ],
  weights: [
    {date:"Mar 1",w:82.5},{date:"Mar 3",w:82.1},{date:"Mar 5",w:81.8},
    {date:"Mar 8",w:81.5},{date:"Mar 10",w:81.9},{date:"Mar 12",w:81.2},
    {date:"Mar 15",w:80.8},{date:"Mar 17",w:80.5},{date:"Mar 19",w:80.2},
  ],
  goal: "muscle", target: 75,
  tab: "home", expanded: null, modal: null,
  // workout form
  newEx: "Bench Press", customEx: "", useCustom: false,
  newSets: [{reps:"",weight:""}],
  // food form
  newFood: "", newGrams: "100",
  // weight form
  newWt: "",
  // AI
  chat: [], chatIn: "", chatLoad: false,
  report: "", repLoad: false,
  photoLoad: false, photoRes: null,
};

const PRESETS = [
  "Bench Press","Squat","Deadlift","Pull-ups","Overhead Press",
  "Barbell Row","Dumbbell Curl","Tricep Pushdown","Leg Press",
  "Romanian Deadlift","Lat Pulldown","Hip Thrust","Cable Fly","Incline Press"
];
const TODAY = "Mar 19";

// ─── PERSIST ──────────────────────────────────────────────────────────────────
function sv() {
  try { localStorage.setItem("pg3", JSON.stringify({
    w:S.workouts, f:S.foods, wt:S.weights,
    g:S.goal, t:S.target, c:S.chat, r:S.report
  })); } catch(e) {}
}
function ld() {
  try {
    const d = JSON.parse(localStorage.getItem("pg3") || "{}");
    if(d.w)  S.workouts = d.w;
    if(d.f)  S.foods    = d.f;
    if(d.wt) S.weights  = d.wt;
    if(d.g)  S.goal     = d.g;
    if(d.t)  S.target   = d.t;
    if(d.c)  S.chat     = d.c;
    if(d.r)  S.report   = d.r;
  } catch(e) {}
}

// ─── COMPUTED ─────────────────────────────────────────────────────────────────
const tw  = () => S.workouts.filter(w => w.date === TODAY);
const tf  = () => S.foods.filter(f => f.date === TODAY);
const nut = () => tf().reduce((a,f) => ({
  cal:a.cal+f.cal, protein:a.protein+f.protein,
  carbs:a.carbs+f.carbs, fat:a.fat+f.fat
}), {cal:0,protein:0,carbs:0,fat:0});
const vol = () => tw().reduce((a,w) => a + w.sets.reduce((b,s) => b+s.reps*s.weight, 0), 0);
const lw  = () => S.weights.length ? S.weights[S.weights.length-1].w : 80;
const cg  = () => S.goal==="muscle" ? 2800 : 2000;
const uniq= () => [...new Set(S.workouts.map(w => w.name))];

function wtg() {
  if(S.weights.length < 2) return "?";
  const last=S.weights[S.weights.length-1].w, first=S.weights[0].w;
  const rate=(last-first)/((S.weights.length-1)/2);
  if(rate===0) return "∞";
  const diff=S.target-last;
  if((diff>0&&rate<0)||(diff<0&&rate>0)) return "∞";
  return Math.abs(Math.ceil(diff/rate));
}

// ─── CHARTS ───────────────────────────────────────────────────────────────────
function mkLine(data, key, color, H=110) {
  if(!data || data.length < 2) return "";
  const vals = data.map(d=>d[key]).filter(v=>v!=null);
  if(!vals.length) return "";
  const mn=Math.min(...vals)-2, mx=Math.max(...vals)+2;
  const W=360, pl=34, pr=8, pt=8, pb=20, iW=W-pl-pr, iH=H-pt-pb;
  const xs = data.map((_,i) => pl + i*(iW/(data.length-1)));
  const fy = v => pt + iH - ((v-mn)/(mx-mn))*iH;
  let path="", dots=""; let st=false;
  data.forEach((d,i) => {
    const v=d[key]; if(v==null){st=false;return;}
    path += (st?"L":"M")+xs[i].toFixed(1)+","+fy(v).toFixed(1)+" "; st=true;
    dots += `<circle cx="${xs[i].toFixed(1)}" cy="${fy(v).toFixed(1)}" r="4" fill="${color}" stroke="var(--card)" stroke-width="1.5"/>`;
  });
  const step = Math.max(1, Math.ceil(data.length/5));
  let xlabs="";
  data.forEach((d,i) => {
    if(i%step===0||i===data.length-1)
      xlabs+=`<text x="${xs[i].toFixed(1)}" y="${H-3}" fill="#444" font-size="9" text-anchor="middle" font-family="Syne">${d.date}</text>`;
  });
  const yv = [mn, mn+(mx-mn)/2, mx];
  let ygrid="";
  yv.forEach(v => {
    const y=fy(v).toFixed(1);
    ygrid+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
    ygrid+=`<text x="${pl-3}" y="${y}" fill="#444" font-size="9" text-anchor="end" dominant-baseline="middle" font-family="Syne">${v.toFixed(1)}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" class="chart">${ygrid}<path d="${path}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${dots}${xlabs}</svg>`;
}

function mkWtChart() {
  const actual = S.weights.map(w => ({date:w.date, actual:w.w}));
  if(S.weights.length < 2) return mkLine(actual, "actual", "var(--accent)");
  const last=S.weights[S.weights.length-1].w, first=S.weights[0].w;
  const rate=(last-first)/(S.weights.length-1);
  const pDates=["Apr 1","Apr 8","Apr 15","Apr 22","May 1","May 8","Jun 1"];
  const proj=pDates.map((date,i)=>({date, projected:+(last+rate*(i+2)*1.5).toFixed(1)}));
  const all=[...actual, ...proj];
  const allV=[...all.map(d=>d.actual||null),...all.map(d=>d.projected||null),S.target].filter(v=>v);
  const mn=Math.min(...allV)-1, mx=Math.max(...allV)+1;
  const W=360, H=160, pl=36, pr=8, pt=10, pb=20, iW=W-pl-pr, iH=H-pt-pb;
  const N=all.length;
  const xs=all.map((_,i)=>pl+i*(iW/(N-1)));
  const fy=v=>pt+iH-((v-mn)/(mx-mn))*iH;
  let aP="", pP=""; let ast=false, pst=false;
  all.forEach((d,i)=>{
    if(d.actual!=null){aP+=(ast?"L":"M")+xs[i].toFixed(1)+","+fy(d.actual).toFixed(1)+" ";ast=true;}
    if(d.projected!=null){pP+=(pst?"L":"M")+xs[i].toFixed(1)+","+fy(d.projected).toFixed(1)+" ";pst=true;}
  });
  const ty=fy(S.target).toFixed(1);
  let dots=""; actual.forEach((d,i)=>dots+=`<circle cx="${xs[i].toFixed(1)}" cy="${fy(d.actual).toFixed(1)}" r="3.5" fill="var(--accent)" stroke="var(--card)" stroke-width="1.5"/>`);
  const step=Math.max(1,Math.ceil(N/5));
  let xlabs=""; all.forEach((d,i)=>{if(i%step===0||i===N-1)xlabs+=`<text x="${xs[i].toFixed(1)}" y="${H-3}" fill="#444" font-size="9" text-anchor="middle" font-family="Syne">${d.date}</text>`;});
  const yv=[+mn.toFixed(1),+(mn+(mx-mn)/2).toFixed(1),+mx.toFixed(1)];
  let ygrid=""; yv.forEach(v=>{const y=fy(v).toFixed(1);ygrid+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/><text x="${pl-3}" y="${y}" fill="#444" font-size="9" text-anchor="end" dominant-baseline="middle" font-family="Syne">${v}</text>`;});
  return `<svg viewBox="0 0 ${W} ${H}" class="chart">${ygrid}
    <line x1="${pl}" y1="${ty}" x2="${W-pr}" y2="${ty}" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="${W-pr-2}" y="${+ty-5}" fill="var(--red)" font-size="9" text-anchor="end" font-family="Syne">Target ${S.target}kg</text>
    <path d="${aP}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="${pP}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-dasharray="6 4" opacity=".6"/>
    ${dots}${xlabs}</svg>`;
}

function exChart(name) {
  const map={};
  S.workouts.filter(w=>w.name===name).forEach(w=>{
    const mx=Math.max(...w.sets.map(s=>s.weight));
    if(!map[w.date]||map[w.date]<mx) map[w.date]=mx;
  });
  const data=Object.entries(map).map(([date,maxKg])=>({date,maxKg}));
  return data.length<2?"":mkLine(data,"maxKg","var(--accent)",90);
}

// ─── API ──────────────────────────────────────────────────────────────────────
async function claude(messages, sys="") {
  try {
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages})
    });
    const d=await r.json();
    return d.content?.map(b=>b.text||"").join("")||"No response.";
  } catch(e) { return "Could not connect to AI. Check your internet."; }
}

      <button class="btn-send" onclick="doChat()" ${S.chatLoad?"disabled":""}>SEND</button>
    </div>
    <div class="qbtns">
      ${["Increase bench weight?","What to eat today?","Am I on track?","Best exercises?"]
        .map(q=>`<button class="qbtn" onclick="doQuick(this.textContent)">${q}</button>`).join("")}
    </div>
  </div>`;
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function rModal() {
  if(!S.modal) return "";
  if(S.modal==="workout") return rWorkoutModal();
  if(S.modal==="food")    return rFoodModal();
  if(S.modal==="weight")  return rWeightModal();
  return "";
}

function rWorkoutModal() {
  return `<div class="overlay" onclick="doModal(null)">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-top">
        <div class="handle"></div>
        <div class="stitle">LOG EXERCISE</div>
      </div>

      <div class="ex-toggle">
        <button class="ex-toggle-btn ${!S.useCustom?"on":""}" onclick="S.useCustom=false;R()">From List</button>
        <button class="ex-toggle-btn ${S.useCustom?"on":""}" onclick="S.useCustom=true;R()">Custom Name</button>
      </div>

      ${!S.useCustom
        ? `<select class="inp" id="es" style="margin-bottom:16px">${PRESETS.map(e=>`<option ${S.newEx===e?"selected":""}>${e}</option>`).join("")}</select>`
        : `<input class="inp" id="ce2" placeholder="e.g. Cable Lateral Raise" value="${S.customEx}" oninput="S.customEx=this.value" style="margin-bottom:16px"/>`
      }

      <label class="lbl">Sets (Reps / Weight kg)</label>
      ${S.newSets.map((s,i)=>`
        <div class="row2" style="margin-bottom:10px">
          <div style="position:relative;flex:1">
            <div style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:10px;pointer-events:none">REPS</div>
            <input class="inp" type="number" inputmode="numeric" style="padding-left:48px" value="${s.reps}" oninput="S.newSets[${i}].reps=this.value"/>
          </div>
          <div style="position:relative;flex:1">
            <div style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:10px;pointer-events:none">KG</div>
            <input class="inp" type="number" inputmode="decimal" style="padding-left:40px" value="${s.weight}" oninput="S.newSets[${i}].weight=this.value"/>
          </div>
          ${S.newSets.length>1?`<button onclick="doRemSet(${i})" style="background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--red);padding:0 14px;cursor:pointer;font-size:16px;min-height:48px">✕</button>`:""}
        </div>`).join("")}

      <button class="btn-s" style="margin-bottom:16px" onclick="doAddSet()">+ Add Another Set</button>
      <button class="btn-p" onclick="doSaveW()">SAVE EXERCISE</button>
    </div>
  </div>`;
}

function rFoodModal() {
  return `<div class="overlay" onclick="doModal(null)">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-top">
        <div class="handle"></div>
        <div class="stitle">LOG FOOD</div>
      </div>
      <div style="color:var(--muted);font-size:12px;margin-bottom:4px">📸 Upload a photo — AI identifies food & estimates all macros</div>
      <input type="file" accept="image/*" capture="environment" id="pf" style="display:none" onchange="doPhoto(this)"/>

      ${!S.photoRes?`
        <button class="photo-btn" onclick="document.getElementById('pf').click()">
          ${S.photoLoad
            ? `<div class="spin" style="width:28px;height:28px;border-width:3px"></div><span class="pulse" style="color:var(--muted);font-size:13px;margin-top:4px">AI is analyzing your food...</span>`
            : `<div style="font-size:40px">📸</div><div style="font-weight:600">Take or choose a photo</div><div style="color:var(--muted);font-size:11px">AI identifies every item & estimates macros</div>`}
        </button>
        <div class="divider">— or enter manually —</div>
        <label class="lbl">Food Name</label>
        <input class="inp" id="fn" placeholder="e.g. Dal Rice, Chicken Tikka" style="margin-bottom:10px" value="${S.newFood}" oninput="S.newFood=this.value"/>
        <label class="lbl">Grams / Serving</label>
        <input class="inp" type="number" inputmode="numeric" style="margin-bottom:16px" value="${S.newGrams}" oninput="S.newGrams=this.value"/>
        <button class="btn-p" onclick="doSaveF()">SAVE FOOD</button>
      `:""}

      ${S.photoRes&&!S.photoRes.raw?`
        ${(S.photoRes.items||[]).map(it=>`
          <div class="pi">
            <div style="font-weight:700;font-size:14px">${it.name} <span style="color:var(--muted);font-size:12px">~${it.grams_estimated}g</span></div>
            <div style="font-size:12px;color:var(--muted);margin-top:3px">
              <span style="color:var(--yellow)">${it.calories} kcal</span> ·
              <span style="color:var(--red)">${it.protein}g P</span> ·
              <span style="color:var(--teal)">${it.carbs}g C</span>
            </div>
          </div>`).join("")}
        ${S.photoRes.totals?`<div class="ptotal">
          <div style="font-family:'Bebas Neue',cursive;font-size:13px;color:var(--accent);margin-bottom:6px">TOTAL</div>
          <div><span style="color:var(--yellow);font-family:'Bebas Neue',cursive;font-size:22px">${S.photoRes.totals.calories}</span><span style="color:var(--muted)"> kcal · </span><span style="color:var(--red)">${S.photoRes.totals.protein}g P</span> · <span style="color:var(--teal)">${S.photoRes.totals.carbs}g C</span></div>
        </div>`:""}
        ${S.photoRes.tip?`<div class="ptip">🤖 ${S.photoRes.tip}</div>`:""}
        <div class="pact">
          <button class="btn-p" style="flex:2" onclick="doAddPhoto()">ADD TO LOG</button>
          <button class="btn-out" onclick="S.photoRes=null;R()">Retry</button>
        </div>
      `:""}
      ${S.photoRes?.raw?`<div style="font-size:13px;color:var(--text);line-height:1.7;margin-bottom:14px">${S.photoRes.raw}</div>`:""}
    </div>
  </div>`;
}

function rWeightModal() {
  return `<div class="overlay" onclick="doModal(null)">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-top">
        <div class="handle"></div>
        <div class="stitle">LOG WEIGHT</div>
      </div>
      <label class="lbl">Today's Weight (kg)</label>
      <input class="inp inp-big" type="number" inputmode="decimal" step="0.1" placeholder="e.g. 79.8" id="wi" style="margin-bottom:20px" value="${S.newWt}" oninput="S.newWt=this.value"/>
      <button class="btn-p" onclick="doSaveWt()">SAVE</button>
    </div>
  </div>`;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
window.doTab    = t => { S.tab=t; R(); };
window.doGoal   = g => { S.goal=g; sv(); R(); };
window.doExp    = id=> { S.expanded=S.expanded===id?null:id; R(); };
window.doModal  = m => { S.modal=m; if(!m){S.photoRes=null;} R(); };
window.doTarget = d => { S.target=+(S.target+d).toFixed(1); sv(); R(); };
window.doAddSet = () => { S.newSets.push({reps:"",weight:""}); R(); };
window.doRemSet = i => { if(S.newSets.length>1) S.newSets.splice(i,1); R(); };

window.doDelW  = id => { S.workouts = S.workouts.filter(w=>w.id!==id); sv(); R(); };
window.doDelF  = id => { S.foods    = S.foods.filter(f=>f.id!==id);   sv(); R(); };
window.doDelWt = idx => {
  const rev = S.weights.slice().reverse();
  const actual_idx = S.weights.length - 1 - idx;
  S.weights.splice(actual_idx, 1);
  sv(); R();
};

window.doSaveW = () => {
  const s0=S.newSets[0]; if(!s0.reps||!s0.weight) return;
  const name = S.useCustom
    ? (document.getElementById("ce2")?.value||S.customEx||"Custom Exercise")
    : (document.getElementById("es")?.value||S.newEx);
  S.workouts.push({id:Date.now(), date:TODAY, name, sets:S.newSets.map(s=>({reps:+s.reps,weight:+s.weight}))});
  S.newSets=[{reps:"",weight:""}]; S.customEx=""; S.useCustom=false; S.modal=null; sv(); R();
};

window.doSaveF = () => {
  const name=document.getElementById("fn")?.value||S.newFood;
  const g=+(S.newGrams||100); if(!name) return;
  S.foods.push({id:Date.now(),date:TODAY,name,cal:Math.round(g*1.5),protein:Math.round(g*.2),carbs:Math.round(g*.3),fat:Math.round(g*.05)});
  S.newFood=""; S.modal=null; sv(); R();
};

window.doSaveWt = () => {
  const v=+(document.getElementById("wi")?.value||S.newWt); if(!v) return;
  S.weights.push({date:TODAY, w:v}); S.newWt=""; S.modal=null; sv(); R();
};

window.doPhoto = async (inp) => {
  const file=inp.files[0]; if(!file) return;
  S.photoLoad=true; S.photoRes=null; R();
  const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
  try {
    const reply=await claude([{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:b64}},
      {type:"text",text:`Identify all food items in this image. Respond ONLY in valid JSON (no markdown backticks): {"items":[{"name":"","grams_estimated":0,"calories":0,"protein":0,"carbs":0,"fat":0}],"totals":{"calories":0,"protein":0,"carbs":0,"fat":0},"tip":""}`}
    ]}]);
    const clean=reply.replace(/```json|```/g,"").trim();
    S.photoRes=JSON.parse(clean);
  } catch(e) { S.photoRes={raw:"Could not analyze. Try again or enter manually."}; }
  S.photoLoad=false; R();
};

window.doAddPhoto = () => {
  if(!S.photoRes?.totals) return;
  const t=S.photoRes.totals;
  S.foods.push({id:Date.now(),date:TODAY,name:(S.photoRes.items||[]).map(i=>i.name).join(", ")||"Photo Meal",cal:t.calories,protein:t.protein,carbs:t.carbs,fat:t.fat});
  S.photoRes=null; S.modal=null; sv(); R();
};

window.doReport = async () => {
  S.repLoad=true; S.report=""; R();
  S.report=await claude(
    [{role:"user",content:`My fitness data: ${ctx()}\n\nGive me a personalized coach report:\n1. Current progress analysis based on my data\n2. Specific weight targets to hit next session for each exercise\n3. Diet adjustments for my goal\n4. One motivational line\nBe direct, specific, under 250 words. Use bullet points.`}],
    "You are an expert personal trainer and nutritionist. Give precise, actionable advice based only on the data provided."
  );
  S.repLoad=false; sv(); R();
};

window.doChat = async () => {
  const msg=(document.getElementById("ci")?.value||S.chatIn).trim();
  if(!msg||S.chatLoad) return;
  S.chat.push({role:"user",content:msg}); S.chatIn=""; S.chatLoad=true; R();
  setTimeout(()=>document.getElementById("ce")?.scrollIntoView({behavior:"smooth"}),50);
  const reply=await claude(
    S.chat.map(m=>({role:m.role,content:m.content})),
    `You are PATTA GHOBI's AI fitness coach. User data: ${ctx()}. Answer concisely and reference their actual numbers.`
  );
  S.chat.push({role:"assistant",content:reply}); S.chatLoad=false; sv(); R();
  setTimeout(()=>document.getElementById("ce")?.scrollIntoView({behavior:"smooth"}),100);
};

window.doQuick = q => {
  S.chatIn=q; S.tab="coach"; R();
  setTimeout(()=>{ const el=document.getElementById("ci"); if(el){el.value=q;el.focus();} },100);
};

// ─── BOOT ─────────────────────────────────────────────────────────────────────
ld();
document.getElementById("boot").remove();
R();
if("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(()=>{});
</script>
</body>
</html>
