<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no"/>
<title>PATTA GHOBI</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#030305"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="PATTA GHOBI"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#030305;overscroll-behavior:none}
body{color:#F1F5F9;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overflow:hidden}
input,select,button,textarea{-webkit-appearance:none;appearance:none;font-family:'DM Sans',sans-serif}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input::placeholder,textarea::placeholder{color:#334155}
select option{background:#0f0f18}
::-webkit-scrollbar{display:none}

#app{max-width:430px;margin:0 auto;position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;overflow:hidden;isolation:isolate}

/* BLOBS */
#blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.3;animation:blobfloat 22s ease-in-out infinite}
.b1{width:320px;height:320px;background:radial-gradient(circle,#7C3AED,transparent 70%);top:-100px;left:-80px;animation-delay:0s}
.b2{width:260px;height:260px;background:radial-gradient(circle,#0EA5E9,transparent 70%);top:35%;right:-80px;animation-delay:-8s}
.b3{width:220px;height:220px;background:radial-gradient(circle,#059669,transparent 70%);bottom:-70px;left:25%;animation-delay:-16s}
@keyframes blobfloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(20px,-25px) scale(1.04)}66%{transform:translate(-15px,18px) scale(.96)}}

/* HEADER */
#hdr{flex-shrink:0;position:relative;z-index:10;padding-top:max(52px,env(safe-area-inset-top,20px));padding-left:20px;padding-right:20px;padding-bottom:12px;background:rgba(3,3,5,.75);-webkit-backdrop-filter:blur(24px) saturate(180%);backdrop-filter:blur(24px) saturate(180%);border-bottom:1px solid rgba(255,255,255,.07)}
.hrow{display:flex;justify-content:space-between;align-items:center}
.logo-w{display:flex;align-items:center;gap:10px}
.logo-ic{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#A3FF4F,#2DD4BF);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 20px rgba(163,255,79,.4)}
.logo-t{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:.06em;line-height:1}
.logo-s{font-size:9px;color:#475569;letter-spacing:.07em;margin-top:1px;text-transform:uppercase}
.hr{display:flex;align-items:center;gap:8px}
.wpill{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:7px 12px;text-align:center;cursor:pointer;-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);transition:background .2s;min-width:72px}
.wpill:active{background:rgba(255,255,255,.1)}
.wv{font-family:'Bebas Neue',cursive;font-size:22px;color:#A3FF4F;line-height:1}
.wl{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.06em}
.ibtn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:9px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;min-width:40px;min-height:40px;transition:background .2s}
.ibtn:active{background:rgba(255,255,255,.12)}

/* NAV */
#nav{flex-shrink:0;position:relative;z-index:10;display:flex;background:rgba(3,3,5,.7);-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.07)}
.ntab{flex:1;background:none;border:none;padding:10px 0 8px;color:#475569;cursor:pointer;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;min-height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.ntab.on{color:#A3FF4F;border-bottom-color:#A3FF4F}
.ni{font-size:17px;line-height:1}

/* SCROLL */
#scr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px 18px 48px;position:relative;z-index:5}

/* GLASS CARDS */
.card{background:rgba(255,255,255,.04);-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:16px;margin-bottom:12px;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.csm{background:rgba(255,255,255,.04);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:13px 15px;margin-bottom:9px;transition:background .2s}
.card-acc{background:linear-gradient(135deg,rgba(163,255,79,.08),rgba(45,212,191,.04));border:1px solid rgba(163,255,79,.18);border-radius:20px;padding:16px;margin-bottom:12px}
.card-ai{background:linear-gradient(135deg,rgba(167,139,250,.08),rgba(14,165,233,.04));border:1px solid rgba(167,139,250,.18);border-radius:20px;padding:16px;margin-bottom:12px}
.card-warn{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.2);border-radius:14px;padding:14px 16px;margin-bottom:12px}

/* STATS */
.sg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:12px}
.st{background:rgba(255,255,255,.04);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:13px 10px}
.stl{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;font-weight:700}
.stv{font-family:'Bebas Neue',cursive;font-size:26px;line-height:1}
.stu{font-size:10px;color:#475569;font-family:'DM Sans';margin-left:2px}

/* SECTION HEAD */
.sh{font-size:10px;color:#475569;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;margin-top:4px}

/* BAR */
.barbg{height:5px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.barfill{height:100%;border-radius:99px;background:linear-gradient(90deg,#A3FF4F,#2DD4BF);transition:width .5s cubic-bezier(.4,0,.2,1)}

/* MACROS */
.macs{display:flex;gap:10px;margin-top:12px}
.mac{flex:1;text-align:center}
.macv{font-family:'Bebas Neue',cursive;font-size:24px;line-height:1}
.macl{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-top:3px;font-weight:700}

/* BUTTONS */
.btn-p{background:linear-gradient(135deg,#A3FF4F,#7EE825);color:#000;font-size:15px;font-weight:700;border:none;border-radius:14px;padding:15px 20px;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;min-height:50px;box-shadow:0 4px 20px rgba(163,255,79,.25);transition:opacity .2s,transform .1s}
.btn-p:active{transform:scale(.98);opacity:.9}
.btn-p:disabled{opacity:.5;box-shadow:none}
.btn-p2{background:linear-gradient(135deg,#A78BFA,#7C3AED);color:#fff;font-size:15px;font-weight:700;border:none;border-radius:14px;padding:15px 20px;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;min-height:50px;box-shadow:0 4px 20px rgba(167,139,250,.25);transition:opacity .2s,transform .1s}
.btn-p2:active{transform:scale(.98);opacity:.9}
.btn-p2:disabled{opacity:.5}
.btn-g{background:linear-gradient(135deg,#0EA5E9,#0284C7);color:#fff;font-size:14px;font-weight:700;border:none;border-radius:12px;padding:13px 18px;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;min-height:46px;box-shadow:0 4px 16px rgba(14,165,233,.2);transition:opacity .2s,transform .1s}
.btn-g:active{transform:scale(.98);opacity:.9}
.btn-s{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px;color:#94A3B8;font-size:13px;font-weight:500;cursor:pointer;width:100%;text-align:center;min-height:44px;transition:background .2s}
.btn-s:active{background:rgba(255,255,255,.1)}
.btn-add{background:linear-gradient(135deg,#A3FF4F,#7EE825);color:#000;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;min-height:38px;box-shadow:0 2px 12px rgba(163,255,79,.2);transition:opacity .2s,transform .1s}
.btn-add:active{transform:scale(.97);opacity:.9}
.btn-send{background:linear-gradient(135deg,#A3FF4F,#7EE825);color:#000;border:none;border-radius:12px;padding:12px 18px;cursor:pointer;font-size:14px;font-weight:700;white-space:nowrap;min-height:46px;min-width:76px;box-shadow:0 4px 16px rgba(163,255,79,.22);transition:opacity .2s,transform .1s}
.btn-send:active{transform:scale(.97)}
.btn-send:disabled{opacity:.5}
.btn-del{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.22);color:#F87171;border-radius:8px;padding:7px 10px;cursor:pointer;font-size:12px;min-width:34px;min-height:34px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.btn-del:active{background:rgba(248,113,113,.2)}
.btn-edit{background:rgba(163,255,79,.1);border:1px solid rgba(163,255,79,.22);color:#A3FF4F;border-radius:8px;padding:7px 10px;cursor:pointer;font-size:12px;min-width:34px;min-height:34px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.btn-edit:active{background:rgba(163,255,79,.2)}
.btn-out{background:rgba(255,255,255,.05);color:#94A3B8;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px;cursor:pointer;font-size:13px;font-weight:500;flex:1;text-align:center;min-height:48px;transition:background .2s}
.btn-check{background:rgba(163,255,79,.1);border:2px solid rgba(163,255,79,.3);color:#A3FF4F;border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.btn-check.done{background:#A3FF4F;color:#000;border-color:#A3FF4F}

/* INPUTS */
.inp{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:13px 14px;color:#F1F5F9;font-size:15px;outline:none;width:100%;min-height:48px;transition:border-color .2s,background .2s;-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px)}
.inp:focus{border-color:rgba(163,255,79,.5);background:rgba(255,255,255,.07)}
.inp-big{font-family:'Bebas Neue',cursive;font-size:40px;text-align:center;letter-spacing:.04em}
.lbl{color:#475569;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;display:block;margin-bottom:6px;margin-top:14px}
.lbl:first-child{margin-top:0}
.row2{display:flex;gap:8px;margin-bottom:8px}
.inp-wrap{position:relative}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#475569;cursor:pointer;font-size:15px;padding:4px}

/* TOGGLE */
.toggle{display:flex;gap:5px;margin-bottom:12px;background:rgba(255,255,255,.04);border-radius:12px;padding:4px}
.tgl{flex:1;padding:9px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:700;text-align:center;min-height:38px;transition:all .2s;border:none;background:none;color:#475569}
.tgl.on{background:rgba(163,255,79,.15);color:#A3FF4F;border:1px solid rgba(163,255,79,.28)}

/* LEVEL PICKER */
.level-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0}
.lvl{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.08);border-radius:14px;padding:16px 8px;cursor:pointer;text-align:center;transition:all .2s}
.lvl.on{background:rgba(163,255,79,.12);border-color:rgba(163,255,79,.4)}
.lvl-ic{font-size:24px;display:block;margin-bottom:6px}
.lvl-t{font-size:12px;font-weight:700;color:#F1F5F9}
.lvl-s{font-size:10px;color:#475569;margin-top:2px}

/* SETROW */
.setrow{display:grid;grid-template-columns:36px 1fr 1fr 40px;gap:7px;padding:10px 0;border-top:1px solid rgba(255,255,255,.06)}
.setrow:first-child{border-top:none}

/* WEIGHT HISTORY */
.whr{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.whr:last-child{border-bottom:none}

/* CHART */
.chw{width:100%;overflow:hidden}
.chw svg{width:100%;display:block}

/* TARGET CTRL */
.trow{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.tcbtn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:9px;width:40px;height:40px;color:#A3FF4F;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:background .2s}
.tcbtn:active{background:rgba(255,255,255,.12)}

/* CHAT */
.chatbox{background:rgba(255,255,255,.03);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:14px;min-height:190px;max-height:280px;overflow-y:auto;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.msg{margin-bottom:12px;display:flex;flex-direction:column;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.u{align-items:flex-end}
.msg.b{align-items:flex-start}
.bub{border-radius:16px;padding:11px 14px;max-width:88%;font-size:13px;line-height:1.65}
.bub.u{background:linear-gradient(135deg,#A3FF4F,#7EE825);color:#000;border-radius:16px 16px 4px 16px;font-weight:500}
.bub.b{background:rgba(167,139,250,.1);color:#F1F5F9;border:1px solid rgba(167,139,250,.18);border-radius:16px 16px 16px 4px}
.cinrow{display:flex;gap:9px;margin-bottom:12px}
.qbtns{display:flex;gap:6px;flex-wrap:wrap}
.qbtn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:8px 13px;color:#94A3B8;font-size:11px;font-weight:500;cursor:pointer;min-height:34px;transition:background .2s}
.qbtn:active{background:rgba(255,255,255,.1)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:ovIn .2s ease}
@keyframes ovIn{from{opacity:0}to{opacity:1}}
.sheet{background:rgba(8,8,16,.96);-webkit-backdrop-filter:blur(30px);backdrop-filter:blur(30px);border-top:1px solid rgba(255,255,255,.1);border-radius:28px 28px 0 0;padding:0 20px;padding-bottom:max(32px,env(safe-area-inset-bottom,20px));width:100%;max-width:430px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 -24px 80px rgba(0,0,0,.9);animation:sheetIn .32s cubic-bezier(.32,.72,0,1)}
@keyframes sheetIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
.shtop{padding:14px 0 18px;position:sticky;top:0;background:rgba(8,8,16,.96);z-index:1}
.hdl{width:40px;height:4px;background:rgba(255,255,255,.12);border-radius:99px;margin:0 auto 16px}
.stitle{font-family:'Bebas Neue',cursive;font-size:28px;color:#A3FF4F;letter-spacing:.04em}

/* ONBOARDING */
#ob{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;background:rgba(3,3,5,.97);-webkit-backdrop-filter:blur(30px);backdrop-filter:blur(30px)}
.ob-icon{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,#A3FF4F,#2DD4BF);display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:24px;box-shadow:0 0 50px rgba(163,255,79,.35);animation:obPop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes obPop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.ob-title{font-family:'Bebas Neue',cursive;font-size:38px;color:#A3FF4F;letter-spacing:.04em;text-align:center;margin-bottom:6px}
.ob-sub{color:#475569;font-size:14px;text-align:center;margin-bottom:36px;line-height:1.55;font-weight:500}
.ob-card{background:rgba(255,255,255,.04);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:24px;width:100%;max-width:360px;margin-bottom:20px}

/* ACTIVE WORKOUT */
.aw-bar{background:rgba(163,255,79,.1);border-bottom:1px solid rgba(163,255,79,.2);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;position:relative;z-index:10}
.aw-timer{font-family:'Bebas Neue',cursive;font-size:28px;color:#A3FF4F;letter-spacing:.04em}
.aw-setbox{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;margin-bottom:10px}
.aw-tip{background:rgba(167,139,250,.07);border:1px solid rgba(167,139,250,.15);border-radius:12px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#94A3B8;line-height:1.55}

/* REST TIMER MODAL */
.rest-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);z-index:250;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rest-ring{position:relative;width:200px;height:200px;margin-bottom:24px}
.rest-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:72px;color:#A3FF4F;letter-spacing:.04em}

/* CALENDAR */
.cal-strip{display:flex;gap:6px;margin-bottom:16px}
.cal-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.cal-label{font-size:9px;color:#475569;font-weight:700;text-transform:uppercase}
.cal-dot{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all .2s}
.cal-dot.trained{background:rgba(163,255,79,.2);color:#A3FF4F;border:1px solid rgba(163,255,79,.3)}
.cal-dot.today{background:linear-gradient(135deg,#A3FF4F,#7EE825);color:#000}
.cal-dot.rest{background:rgba(255,255,255,.04);color:#334155;border:1px solid rgba(255,255,255,.05)}

/* PHOTO */
.photobtn{background:rgba(255,255,255,.03);border:2px dashed rgba(163,255,79,.28);border-radius:20px;padding:28px 14px;cursor:pointer;color:#F1F5F9;width:100%;margin:12px 0 6px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;min-height:140px;font-size:14px;font-weight:600;transition:border-color .2s,background .2s}
.photobtn:active{background:rgba(255,255,255,.05);border-color:rgba(163,255,79,.5)}
.pi{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:11px 14px;margin-bottom:8px}
.ptotal{background:rgba(163,255,79,.06);border:1px solid rgba(163,255,79,.18);border-radius:12px;padding:12px 14px;margin:10px 0}
.ptip{font-size:12px;color:#94A3B8;line-height:1.65;margin-bottom:14px;padding:11px 14px;background:rgba(167,139,250,.07);border:1px solid rgba(167,139,250,.14);border-radius:12px}
.pact{display:flex;gap:9px;margin-top:6px}

/* FOOD SEARCH */
.food-search-list{max-height:220px;overflow-y:auto;margin-top:8px;-webkit-overflow-scrolling:touch}
.food-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:10px;cursor:pointer;transition:background .15s}
.food-item:active{background:rgba(255,255,255,.07)}
.food-item-name{font-size:14px;font-weight:600}
.food-item-macro{font-size:11px;color:#475569;margin-top:2px}

/* MEASUREMENTS */
.meas-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.meas-inp-wrap{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px}
.meas-label{font-size:10px;color:#475569;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.meas-val{font-family:'Bebas Neue',cursive;font-size:26px;color:#A3FF4F;line-height:1}
.meas-unit{font-size:11px;color:#475569;font-family:'DM Sans';margin-left:2px}

/* MILESTONE */
.milestone{background:linear-gradient(135deg,rgba(163,255,79,.1),rgba(45,212,191,.06));border:1px solid rgba(163,255,79,.2);border-radius:16px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}

/* API STATUS */
.api-status{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;margin-top:9px}
.api-ok{background:rgba(163,255,79,.1);color:#A3FF4F;border:1px solid rgba(163,255,79,.25)}
.api-no{background:rgba(248,113,113,.1);color:#F87171;border:1px solid rgba(248,113,113,.25)}

/* TEMPLATE CARDS */
.tpl-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:16px;margin-bottom:10px;cursor:pointer;transition:background .2s,border-color .2s}
.tpl-card:active{background:rgba(255,255,255,.09);border-color:rgba(163,255,79,.3)}
.tpl-tag{display:inline-block;background:rgba(163,255,79,.12);color:#A3FF4F;border:1px solid rgba(163,255,79,.25);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}

/* AI PLAN */
.plan-ex{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px 14px;margin-bottom:8px}

/* SPINNERS & ANIM */
.spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.1);border-top-color:#A3FF4F;border-radius:50%;animation:spin 1s linear infinite}
.spin-lg{width:28px;height:28px;border-width:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeLeft{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes obStep{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(163,255,79,0)}50%{box-shadow:0 0 0 6px rgba(163,255,79,.15)}}
@keyframes numberPop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes borderGlow{0%,100%{border-color:rgba(163,255,79,.15)}50%{border-color:rgba(163,255,79,.45)}}
.fade{animation:fadeUp .32s cubic-bezier(.4,0,.2,1) forwards}
.fade-d{animation:fadeDown .32s cubic-bezier(.4,0,.2,1) forwards}
.fade-l{animation:fadeLeft .32s cubic-bezier(.4,0,.2,1) forwards}
.fade-r{animation:fadeRight .32s cubic-bezier(.4,0,.2,1) forwards}
.scale-in{animation:scaleIn .28s cubic-bezier(.34,1.56,.64,1) forwards}
.slide-up{animation:slideUp .4s cubic-bezier(.4,0,.2,1) forwards}
.pulse{animation:pulse 1.4s ease infinite}
.step-in{animation:obStep .3s ease forwards}
.glow-pulse{animation:glowPulse 2s ease infinite}
/* Staggered children */
.stagger>*:nth-child(1){animation-delay:.05s;opacity:0;animation:fadeUp .3s cubic-bezier(.4,0,.2,1) .05s forwards}
.stagger>*:nth-child(2){animation-delay:.1s;opacity:0;animation:fadeUp .3s cubic-bezier(.4,0,.2,1) .1s forwards}
.stagger>*:nth-child(3){animation-delay:.15s;opacity:0;animation:fadeUp .3s cubic-bezier(.4,0,.2,1) .15s forwards}
.stagger>*:nth-child(4){animation-delay:.2s;opacity:0;animation:fadeUp .3s cubic-bezier(.4,0,.2,1) .2s forwards}
.stagger>*:nth-child(5){animation-delay:.25s;opacity:0;animation:fadeUp .3s cubic-bezier(.4,0,.2,1) .25s forwards}
/* Shimmer loading */
.shimmer{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.04) 75%);background-size:400px 100%;animation:shimmer 1.4s infinite}

.csm:active{transform:scale(.985);transition:transform .1s}

const tw=()=>S.workouts.filter(w=>w.date===TODAY);

function wtg(){
  if(S.weights.length<2)return"?";

  const rate=(last-first)/Math.max(S.weights.length-1,1);

  const diff=S.target-last;
  if((diff>0&&rate<0)||(diff<0&&rate>0))return"∞";
  return Math.abs(Math.ceil(diff/rate));
}

// ─── CHARTS ──────────────────────────────────────────────────────────────────
function mkWtChart(){
  if(S.weights.length<2)return`<div style="color:${M3};font-size:12px;text-align:center;padding:24px 0;font-weight:600">Log at least 2 weight entries to see your progress chart 📈</div>`;
  const actual=S.weights.map(w=>({date:w.date,actual:w.w}));
  const last=S.weights[S.weights.length-1].w,first=S.weights[0].w;
  const rate=(last-first)/Math.max(S.weights.length-1,1);
  const proj=["Apr 1","Apr 8","Apr 15","May 1","Jun 1"].map((date,i)=>({date,proj:+(last+rate*(i+2)*1.5).toFixed(1)}));
  const all=[...actual,...proj];
  const allV=[...S.weights.map(w=>w.w),...proj.map(p=>p.proj),S.target];
  const mn=Math.min(...allV)-1,mx=Math.max(...allV)+1,rng=mx-mn||1;
  const W=360,H=150,pl=36,pr=8,pt=12,pb=22;
  const iW=W-pl-pr,iH=H-pt-pb,N=all.length;
  const xs=all.map((_,i)=>pl+i*(iW/Math.max(N-1,1)));
  const fy=v=>pt+iH-((v-mn)/rng)*iH;
  let aP="",pP="",ast=false,pst=false;
  all.forEach((d,i)=>{
    if(d.actual!=null){aP+=(ast?"L":"M")+xs[i].toFixed(1)+","+fy(d.actual).toFixed(1)+" ";ast=true;}
    if(d.proj!=null){pP+=(pst?"L":"M")+xs[i].toFixed(1)+","+fy(d.proj).toFixed(1)+" ";pst=true;}
  });
  const ty=fy(S.target).toFixed(1);
  let dots="";actual.forEach((d,i)=>{dots+=`<circle cx="${xs[i].toFixed(1)}" cy="${fy(d.actual).toFixed(1)}" r="3.5" fill="${PA}" stroke="#030305" stroke-width="2"/>`;});
  const step=Math.max(1,Math.ceil(N/5));
  let xl="";all.forEach((d,i)=>{if(i%step===0||i===N-1)xl+=`<text x="${xs[i].toFixed(1)}" y="${H-4}" fill="${M3}" font-size="9" text-anchor="middle" font-family="DM Sans,sans-serif">${d.date}</text>`;});
  const yv=[+mn.toFixed(1),+(mn+(mx-mn)/2).toFixed(1),+mx.toFixed(1)];
  let yg="";yv.forEach(v=>{const y=fy(v).toFixed(1);yg+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/><text x="${pl-4}" y="${y}" fill="${M3}" font-size="9" text-anchor="end" dominant-baseline="middle" font-family="DM Sans,sans-serif">${v}</text>`;});
  return`<div class="chw"><svg viewBox="0 0 ${W} ${H}">${yg}
    <line x1="${pl}" y1="${ty}" x2="${W-pr}" y2="${ty}" stroke="${RED}" stroke-width="1.5" stroke-dasharray="4 3" opacity=".7"/>
    <text x="${W-pr-2}" y="${+ty-5}" fill="${RED}" font-size="9" text-anchor="end" font-family="DM Sans,sans-serif">Goal ${S.target}kg</text>
    <path d="${aP}" fill="none" stroke="${PA}" stroke-width="2.5" stroke-linecap="round"/>
    <path d="${pP}" fill="none" stroke="${PA}" stroke-width="1.5" stroke-dasharray="5 4" opacity=".5"/>
    ${dots}${xl}</svg></div>`;
}

function mkExChart(){
  const names=uniq();
  if(!names.length||S.workouts.length<2)return`<div style="color:${M3};font-size:12px;text-align:center;padding:24px 0;font-weight:600">Log workouts on 2+ days to see strength progress 📊</div>`;
  const allDates=[];
  const exData={};
  names.forEach(name=>{
    const map={};
    S.workouts.filter(w=>w.name===name).forEach(w=>{
      const mx=Math.max(...w.sets.map(s=>+s.weight||0));
      if(!map[w.date]||map[w.date]<mx)map[w.date]=mx;
      if(!allDates.includes(w.date))allDates.push(w.date);
    });
    exData[name]=map;
  });
  if(allDates.length<2)return`<div style="color:${M3};font-size:12px;text-align:center;padding:24px 0;font-weight:600">Log workouts on 2+ days to see progress</div>`;
  const allVals=names.flatMap(n=>Object.values(exData[n]).map(v=>+v));
  if(!allVals.length)return"";
  const mn=Math.max(0,Math.min(...allVals)-10),mx=Math.max(...allVals)+15,rng=mx-mn||1;
  const W=360,H=200,pl=36,pr=8,pt=12,pb=22;
  const iW=W-pl-pr,iH=H-pt-pb,N=allDates.length;
  const xOf=i=>pl+i*(iW/Math.max(N-1,1));
  const fy=v=>pt+iH-((v-mn)/rng)*iH;
  let paths="",dots2="";
  names.forEach((name,ni)=>{
    const color=LCOLS[ni%LCOLS.length];
    let path="",st=false;
    allDates.forEach((date,i)=>{
      const v=exData[name][date];
      if(v==null){st=false;return;}
      path+=(st?"L":"M")+xOf(i).toFixed(1)+","+fy(v).toFixed(1)+" ";st=true;
      dots2+=`<circle cx="${xOf(i).toFixed(1)}" cy="${fy(v).toFixed(1)}" r="3.5" fill="${color}" stroke="#030305" stroke-width="2"/>`;
    });
    if(path)paths+=`<path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
  });
  const step=Math.max(1,Math.ceil(N/5));
  let xl="";allDates.forEach((d,i)=>{if(i%step===0||i===N-1)xl+=`<text x="${xOf(i).toFixed(1)}" y="${H-4}" fill="${M3}" font-size="9" text-anchor="middle" font-family="DM Sans,sans-serif">${d}</text>`;});
  const yv=[+mn.toFixed(0),+(mn+(mx-mn)/2).toFixed(0),+mx.toFixed(0)];
  let yg="";yv.forEach(v=>{const y=fy(v).toFixed(1);yg+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/><text x="${pl-4}" y="${y}" fill="${M3}" font-size="9" text-anchor="end" dominant-baseline="middle" font-family="DM Sans,sans-serif">${v}</text>`;});
  const legend=names.map((n,i)=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:18px;height:3px;background:${LCOLS[i%LCOLS.length]};border-radius:2px;flex-shrink:0"></div><span style="font-size:11px;color:${TX};font-weight:600">${n}</span></div>`).join("");
  return`<div class="chw"><svg viewBox="0 0 ${W} ${H}">${yg}${paths}${dots2}${xl}</svg></div>
    <div style="display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:12px;padding-top:12px;border-top:1px solid ${BD}">${legend}</div>`;
}

function mkRestRing(remaining,max){
  const pct=remaining/max;
  const r=86,cx=100,cy=100,circ=2*Math.PI*r;
  const dash=pct*circ,gap=circ-dash;
  return`<svg viewBox="0 0 200 200" style="width:200px;height:200px">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="10"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${PA}" stroke-width="10"
      stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}"
      stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"
      style="transition:stroke-dasharray .5s linear"/>
  </svg>`;
}

// ─── GEMINI API ───────────────────────────────────────────────────────────────
async function gemini(prompt,sys,imgB64,imgMime){
  if(!S.apiKey)return"⚠️ No Gemini API key. Tap ⚙️ → enter your free key from aistudio.google.com";
  try{
    const model="gemini-2.0-flash";
    const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${S.apiKey}`;
    const parts=[];
    if(imgB64)parts.push({inline_data:{mime_type:imgMime||"image/jpeg",data:imgB64}});
    parts.push({text:sys?`${sys}\n\n${prompt}`:prompt});
    const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts}]})});
    const d=await r.json();
    if(d.error)return"AI error: "+d.error.message;
    return d.candidates?.[0]?.content?.parts?.[0]?.text||"No response.";
  }catch(e){return"Could not connect. Check your internet and API key.";}
}

function startWorkout(templateIdx,custom){
  clearInterval(S.awInterval);
  const template=TEMPLATES[templateIdx];
  const exes=custom||template.exercises.map(e=>({
    name:e.name,
    tip:TIPS[e.name]||"Focus on form. Controlled movement beats heavy sloppy reps.",
    sets:Array.from({length:e.sets},()=>({reps:String(e.reps),weight:"",done:false}))
  }));
  S.activeWorkout={templateName:custom?"Custom Workout":template.name,startTime:Date.now(),exercises:exes,elapsed:0};
  S.awInterval=setInterval(()=>{
    if(S.activeWorkout){S.activeWorkout.elapsed=Date.now()-S.activeWorkout.startTime;rAwBar();}
  },1000);
  S.tab="lift";S.modal=null;R();
}

function finishWorkout(){
  if(!S.activeWorkout)return;
  clearInterval(S.awInterval);
  // Save all exercises as workouts
  S.activeWorkout.exercises.forEach(ex=>{
    const doneSets=ex.sets.filter(s=>s.done&&s.reps&&s.weight);
    if(doneSets.length){
      S.workouts.push({id:Date.now()+Math.random(),date:TODAY,name:ex.name,sets:doneSets.map(s=>({reps:+s.reps,weight:+s.weight}))});
    }
  });
  const elapsed=S.activeWorkout.elapsed;
  const totalVol=S.activeWorkout.exercises.reduce((a,ex)=>a+ex.sets.filter(s=>s.done).reduce((b,s)=>b+(+s.reps||0)*(+s.weight||0),0),0);
  const summary={duration:fmtElapsed(elapsed),exercises:S.activeWorkout.exercises.filter(ex=>ex.sets.some(s=>s.done)).length,volume:totalVol};
  S.activeWorkout=null;
  clearInterval(S.awInterval);
  sv();
  // Show summary modal
  S.modal="workout-summary";
  S._lastSummary=summary;
  R();
}

          <span style="font-size:12px;font-weight:700;color:${M2}">Day Total</span>

  ${S.aiMealPlan?`<div class="card-ai fade-l" style="animation-delay:.15s">

// ─── GROW ─────────────────────────────────────────────────────────────────────
function rGrow(){
  const lv=lw(), ues=uniq();
  const lastMeas=S.measurements.slice(-1)[0]||null;
  // Milestone
  let milestone="";
  if(S.weights.length>=2){
    const first=S.weights[0], last=S.weights[S.weights.length-1];
    const diff=+(last.w-first.w).toFixed(1);
    const weeks=Math.round((S.weights.length-1)/2);
    if(Math.abs(diff)>=0.5){
      milestone=`<div class="milestone">
        <div>
          <div style="font-size:10px;color:${PA};font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Progress Since Start</div>
          <div style="font-size:14px;font-weight:700">${first.date} → ${last.date}</div>
          <div style="font-size:13px;color:${M2};margin-top:3px;font-weight:500">Over ~${weeks} week${weeks!==1?"s":""}</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Bebas Neue',cursive;font-size:36px;color:${diff<0?PA:RED};line-height:1">${diff>0?"+":""}${diff}</div>
          <div style="font-size:11px;color:${M2};font-weight:600">kg</div>

          <span style="font-size:13px;color:${M3};font-family:'DM Sans';margin-left:4px">kg</span>

      <div style="display:flex;flex-direction:column;gap:7px;align-items:center">
        <button class="tcbtn" onclick="TG(.5)">＋</button>
        <div style="font-family:'Bebas Neue',cursive;font-size:24px;color:${PA}">${S.target}</div>

      </div>

    ${mkWtChart()}
  </div>

  <!-- BODY MEASUREMENTS -->
  <div class="sh">BODY MEASUREMENTS</div>

    <div class="flx" style="margin-bottom:12px">
      <div style="font-weight:700;font-size:14px">${lastMeas?`Last logged ${lastMeas.date}`:"No measurements yet"}</div>
      <button class="btn-add" onclick="M('measurement')" style="font-size:12px;padding:7px 12px">+ LOG</button>

      ${[["Chest","chest","cm"],["Waist","waist","cm"],["Arms","arms","cm"],["Hips","hips","cm"]].map(([l,k,u])=>lastMeas[k]?`<div class="meas-inp-wrap">

      </div>`:"").join("")}

  <!-- WEIGHT HISTORY -->
  <div class="sh">WEIGHT HISTORY</div>
  <div class="card">
    <div class="wh-summary" onclick="WHT()">
      <div>
        <div style="font-weight:700;font-size:14px">${S.weights.length} entries logged</div>

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
window.T    = t  => { S.tab=t; R(); };
window.EX   = id => { S.expanded=S.expanded===id?null:id; R(); };
window.Mc   = m  => { S.modal=m; if(!m){S.photoRes=null; S.editId=null; S.foodSearch="";} R(); };
window.M    = m  => { Mc(m); };
window.TG   = d  => { S.target=+(S.target+d).toFixed(1); sv(); R(); };
window.AS   = () => { S.newSets.push({reps:"",weight:""}); R(); };
window.RS   = i  => { if(S.newSets.length>1)S.newSets.splice(i,1); R(); };
window.DW   = id => { S.workouts=S.workouts.filter(w=>w.id!==id); sv(); R(); };
window.DF   = id => { S.foods=S.foods.filter(f=>f.id!==id); sv(); R(); };
window.DWT  = idx=> { S.weights.splice(idx,1); sv(); R(); };
window.WHT  = ()=> { S.whOpen=!S.whOpen; R(); };

// ── Day log toggle (food tab) ─────────────────────────────────────────────────
window.toggleDayLog = dateStr => {
  if(!S._openDayLogs)S._openDayLogs={};
  S._openDayLogs[dateStr]=!S._openDayLogs[dateStr];
  R();
};

// ── Export / Import ───────────────────────────────────────────────────────────
window.exportData = () => {
  const data={
    version:"pg8",
    exportedAt:new Date().toISOString(),
    name:S.name, level:S.level,
    workouts:S.workouts, foods:S.foods,
    weights:S.weights, measurements:S.measurements,
    target:S.target, calorieGoal:S.calorieGoal,
    proteinGoal:S.proteinGoal, chat:S.chat,
    apiKey:S.apiKey
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`patta-ghobi-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  const msg=document.getElementById("backup-msg");
  if(msg){msg.style.display="block";msg.textContent="✓ Data exported successfully!";setTimeout(()=>{msg.style.display="none";},3000);}
};

window.importData = (inp) => {
  const file=inp.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.workouts)S.workouts=data.workouts;
      if(data.foods)S.foods=data.foods;
      if(data.weights)S.weights=data.weights;
      if(data.measurements)S.measurements=data.measurements;
      if(data.target)S.target=data.target;
      if(data.calorieGoal)S.calorieGoal=data.calorieGoal;
      if(data.proteinGoal)S.proteinGoal=data.proteinGoal;
      if(data.name)S.name=data.name;
      if(data.level)S.level=data.level;
      if(data.chat)S.chat=data.chat;
      if(data.apiKey)S.apiKey=data.apiKey;
      if(data.name)S.onboarded=true;
      sv();
      const msg=document.getElementById("backup-msg");
      if(msg){msg.style.display="block";msg.textContent="✓ Data imported! Your history is restored.";msg.style.color="#A3FF4F";}
      setTimeout(()=>{ Mc(null); R(); },1500);
    }catch(err){
      const msg=document.getElementById("backup-msg");
      if(msg){msg.style.display="block";msg.style.color="#F87171";msg.textContent="✗ Invalid file. Please use a Patta Ghobi backup file.";}
    }
  };
  reader.readAsText(file);
};

// Active workout
window.awSetVal  = (ei,si,k,v) => { if(S.activeWorkout)S.activeWorkout.exercises[ei].sets[si][k]=v; };
window.awDoneSet = (ei,si)     => {
  if(!S.activeWorkout)return;
  const set=S.activeWorkout.exercises[ei].sets[si];
  set.done=!set.done;
  if(set.done){startRest(90);}
  else{skipRest();}
  R();
};
window.addAwSet  = ei => {
  if(!S.activeWorkout)return;
  S.activeWorkout.exercises[ei].sets.push({reps:"",weight:"",done:false});R();
};
window.cancelWorkout = () => {
  clearInterval(S.awInterval);S.activeWorkout=null;sv();R();
};
window.startRest = startRest;
window.skipRest  = skipRest;

window.openEdit = id => {
  const w=S.workouts.find(x=>x.id===id); if(!w)return;
  S.editId=id; S.newEx=w.name; S.customEx=w.name;
  S.useCustom=!PRESETS.includes(w.name);
  S.newSets=w.sets.map(s=>({reps:String(s.reps),weight:String(s.weight)}));
  S.modal="edit"; R();
};

window.SW = isEdit => {
  const s0=S.newSets[0]; if(!s0.reps||!s0.weight)return;
  const name=S.useCustom
    ?(document.getElementById("cex")?.value||S.customEx||"Custom")
    :(document.getElementById("es")?.value||S.newEx);
  const sets=S.newSets.map(s=>({reps:+s.reps,weight:+s.weight}));
  if(isEdit&&S.editId){
    S.workouts=S.workouts.map(w=>w.id===S.editId?{...w,name,sets}:w);
  } else {
    S.workouts.push({id:Date.now(),date:TODAY,name,sets});
  }
  S.newSets=[{reps:"",weight:""}]; S.customEx=""; S.useCustom=false; S.editId=null; S.modal=null; sv(); R();
};

window.pickFood = name => {
  S.newFood=name; S.foodSearch=""; R();
};

window.SF = () => {
  const name=S.newFood;
  const g=+(document.getElementById("fg")?.value||S.newGrams||100); if(!name)return;
  const f=FOOD_DB[name]||{cal:150,protein:10,carbs:20,fat:5};
  S.foods.push({id:Date.now(),date:TODAY,name,cal:Math.round(f.cal*g/100),protein:Math.round(f.protein*g/100),carbs:Math.round(f.carbs*g/100),fat:Math.round(f.fat*g/100)});
  S.newFood=""; S.modal=null; sv(); R();
};

window.SaveWt = () => {
  const v=+(document.getElementById("wi")?.value||S.newWt); if(!v)return;
  S.weights.push({date:TODAY,w:v}); S.newWt=""; S.modal=null; sv(); R();
};

window.SaveMeas = () => {
  const m={date:TODAY,...Object.fromEntries(Object.entries(S.newMeas).filter(([k,v])=>v).map(([k,v])=>[k,+v]))};
  if(Object.keys(m).length<=1)return;
  S.measurements.push(m); S.newMeas={chest:"",waist:"",arms:"",hips:""}; S.modal=null; sv(); R();
};

window.saveKey = () => {
  const v=document.getElementById("apiinp")?.value||S.apiKey;
  S.apiKey=v.trim(); sv(); Mc(null);
};

window.clearAll = () => {
  if(!confirm("Delete ALL your data? This cannot be undone."))return;
  S.workouts=[]; S.foods=[]; S.weights=[]; S.measurements=[];
  S.chat=[]; S.report=""; S.whOpen=false; S.aiMealPlan=null; S.aiWorkoutPlan=null;
  sv(); Mc(null); R();
};

window.PH = async inp => {
  const file=inp.files[0]; if(!file)return;
  S.photoLoad=true; S.photoRes=null; R();
  const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
  try{
    const reply=await gemini(`Identify all food items in this image. Return ONLY valid JSON (no markdown): {"items":[{"name":"","grams_estimated":0,"calories":0,"protein":0,"carbs":0,"fat":0}],"totals":{"calories":0,"protein":0,"carbs":0,"fat":0},"tip":""}`,null,b64,file.type||"image/jpeg");
    S.photoRes=JSON.parse(reply.replace(/```json\n?|```/g,"").trim());
  }catch(e){S.photoRes={raw:"Could not analyze photo. Please try again or search the food database manually."};}
  S.photoLoad=false; R();
};

window.AP = () => {
  if(!S.photoRes?.totals)return;
  const t=S.photoRes.totals;
  S.foods.push({id:Date.now(),date:TODAY,name:(S.photoRes.items||[]).map(i=>i.name).join(", ")||"Photo Meal",cal:t.calories,protein:t.protein,carbs:t.carbs,fat:t.fat});
  S.photoRes=null; S.modal=null; sv(); R();
};

window.doRep = async () => {
  S.repLoad=true; S.report=""; R();
  S.report=await gemini(`${ctx()}\n\nGive me a personalized coach report:\n• Progress analysis with specifics\n• Target weights for my next session on each exercise (be specific, use my recent numbers)\n• Diet adjustments based on my nutrition data and goals\n• One powerful motivational insight tailored to my situation\nBe direct, specific, conversational. Under 280 words. Use bullet points.`,
    "You are an expert personal trainer and nutritionist. Always reference the user's actual data. Be encouraging but honest.");
  S.repLoad=false; sv(); R();
};

window.doMealPlan = async () => {
  S.aiMealLoad=true; S.aiMealPlan=null; R();
  const reply=await gemini(`${ctx()}\n\nGenerate a one-day meal plan for me. Aim for ${S.calorieGoal}kcal total and ${S.proteinGoal}g protein. Include 5-6 meals/snacks appropriate for an Indian diet where possible. Return ONLY valid JSON (no markdown): [{"name":"meal name","grams":150,"calories":400,"protein":35,"carbs":40,"fat":10,"meal_type":"breakfast"}]`,
    "You are a nutrition expert. Return only valid JSON array.");
  try{S.aiMealPlan=JSON.parse(reply.replace(/```json\n?|```/g,"").trim());}
  catch(e){S.aiMealPlan=null;}
  S.aiMealLoad=false; R();
};

window.addMeal = i => {
  const m=S.aiMealPlan[i]; if(!m)return;
  S.foods.push({id:Date.now(),date:TODAY,name:m.name,cal:m.calories,protein:m.protein,carbs:m.carbs,fat:m.fat});
  sv(); R();
};

window.addAllMeals = () => {
  (S.aiMealPlan||[]).forEach(m=>{S.foods.push({id:Date.now()+Math.random(),date:TODAY,name:m.name,cal:m.calories,protein:m.protein,carbs:m.carbs,fat:m.fat});});
  sv(); R();
};

window.doAiWorkout = async () => {
  S.aiWorkoutLoad=true; S.aiWorkoutPlan=null; R();
  const focus=document.getElementById("aw-focus")?.value||S.aiWorkoutFocus;
  const reply=await gemini(`${ctx()}\n\nGenerate a workout for: ${focus}\nLevel: ${S.level}. Based on my history, suggest appropriate weights. Return ONLY valid JSON (no markdown): [{"name":"Exercise Name","sets":3,"reps":8,"weight":60,"tip":"brief form cue"}]`,
    "You are a personal trainer. Return only a valid JSON array. Suggest realistic weights based on user's history.");
  try{S.aiWorkoutPlan=JSON.parse(reply.replace(/```json\n?|```/g,"").trim());}
  catch(e){S.aiWorkoutPlan=null;}
  S.aiWorkoutLoad=false; R();
};

window.startAiWorkout = () => {
  if(!S.aiWorkoutPlan)return;
  const exes=S.aiWorkoutPlan.map(ex=>({
    name:ex.name,
    tip:ex.tip||TIPS[ex.name]||"Focus on form and controlled movement.",
    sets:Array.from({length:ex.sets||3},()=>({reps:String(ex.reps||8),weight:String(ex.weight||""),done:false}))
  }));
  startWorkout(0,exes);
  S.activeWorkout.templateName="AI: "+((document.getElementById("aw-focus")?.value)||S.aiWorkoutFocus);
};

window.doWeeklyReport = async () => {
  S.repLoad=true; R();
  const weekWorkouts=S.workouts.slice(-20);
  const weekFoods=S.foods.slice(-50);
  const prompt=`${ctx()}\n\nGenerate a weekly performance summary covering:\n• Total workouts this week and exercises hit\n• Best lifts and any new PRs\n• Average daily nutrition vs goals\n• Weight change trend\n• Top 2 things to focus on next week\n• One personalized insight\nBe encouraging, data-driven, and specific. Under 300 words.`;
  S.report=await gemini(prompt,"You are an expert fitness coach doing a weekly review.");
  S.repLoad=false; sv(); R();
};

window.CH = async () => {
  const msg=(document.getElementById("ci")?.value||S.chatIn||"").trim();
  if(!msg||S.chatLoad)return;
  S.chat.push({role:"user",content:msg}); S.chatIn=""; S.chatLoad=true; R();
  setTimeout(()=>document.getElementById("ce")?.scrollIntoView({behavior:"smooth"}),60);
  const history=S.chat.slice(-8).map(m=>`${m.role==="user"?"User":"Coach"}: ${m.content}`).join("\n");
  const reply=await gemini(msg,`You are PATTA GHOBI's expert AI fitness coach for ${S.name||"the user"}.\n${ctx()}\nRecent chat:\n${history}\nBe concise, friendly, reference actual data. Give actionable specific advice.`);
  S.chat.push({role:"assistant",content:reply}); S.chatLoad=false; sv(); R();
  setTimeout(()=>document.getElementById("ce")?.scrollIntoView({behavior:"smooth"}),100);
};

window.QA = q => {
  S.chatIn=q; S.tab="coach"; R();
  setTimeout(()=>{const el=document.getElementById("ci");if(el){el.value=q;el.focus();}},100);
};

try{ld();}catch(e){}

if(S.onboarded){
  document.getElementById("boot").style.display="none";
  document.getElementById("hdr").style.display="";
  document.getElementById("nav").style.display="";
  document.getElementById("scr").style.display="";
  R();
} else {
  document.getElementById("boot").style.display="none";
  document.getElementById("ob").style.display="flex";
  rOnboarding();
}

if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js").catch(()=>{});
